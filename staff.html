<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Era of MathAntics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-['Inter']" x-data="staffPortal()">

    <!-- Login Section -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-red-600 p-4">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-800">Staff Access</h1>
                    <p class="text-gray-500 mt-2">Please enter the administrative password</p>
                </div>
                <form @submit.prevent="login">
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2 text-gray-700">Password</label>
                        <input type="password" x-model="loginPass" 
                            class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            placeholder="••••••••" required>
                    </div>
                    <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg hover:shadow-xl">
                        Login to Portal
                    </button>
                    <p x-show="error" class="text-red-500 text-sm mt-4 text-center" x-text="error"></p>
                </form>
            </div>
        </div>
    </template>

    <!-- Dashboard Section -->
    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <!-- Sidebar -->
            <aside class="w-64 bg-slate-900 text-white hidden md:block">
                <div class="p-6">
                    <h2 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-red-400 bg-clip-text text-transparent">
                        Admin Dashboard
                    </h2>
                </div>
                <nav class="mt-6">
                    <button @click="activeTab = 'admissions'" :class="activeTab === 'admissions' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-user-graduate w-6"></i> Admissions
                    </button>
                    <button @click="activeTab = 'payments'" :class="activeTab === 'payments' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-file-invoice-dollar w-6"></i> Payments
                    </button>
                    <button @click="activeTab = 'news'" :class="activeTab === 'news' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-newspaper w-6"></i> Post News
                    </button>
                    <button @click="activeTab = 'docs'" :class="activeTab === 'docs' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-folder-open w-6"></i> Resources
                    </button>
                </nav>
                <div class="absolute bottom-0 w-64 p-6">
                    <button @click="logout" class="text-slate-400 hover:text-white flex items-center transition-colors">
                        <i class="fas fa-sign-out-alt mr-2"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-8">
                <header class="flex justify-between items-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800" x-text="tabTitle()"></h1>
                    <button @click="exportData" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center text-sm transition-all shadow-md">
                        <i class="fas fa-download mr-2"></i> Export Data
                    </button>
                </header>

                <!-- Admissions Section -->
                <div x-show="activeTab === 'admissions'" class="space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b text-gray-600 uppercase text-xs font-bold">
                                <tr>
                                    <th class="px-6 py-4">Student Name</th>
                                    <th class="px-6 py-4">Class</th>
                                    <th class="px-6 py-4">Date</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <template x-for="item in admissions" :key="item.id">
                                    <tr class="hover:bg-blue-50/50 transition-colors">
                                        <td class="px-6 py-4 font-medium" x-text="item.name || 'Unnamed'"></td>
                                        <td class="px-6 py-4 text-gray-600" x-text="item.studentClass || 'N/A'"></td>
                                        <td class="px-6 py-4 text-gray-500 text-sm" x-text="formatDate(item.createdAt)"></td>
                                        <td class="px-6 py-4">
                                            <span :class="item.status === 'Approved' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'" 
                                                class="px-2 py-1 rounded-full text-xs font-semibold" x-text="item.status"></span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <button @click="approveAdmission(item.id)" x-show="item.status !== 'Approved'" class="text-blue-600 hover:underline font-semibold text-sm">Approve</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Payments Section -->
                <div x-show="activeTab === 'payments'" class="space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b text-gray-600 uppercase text-xs font-bold">
                                <tr>
                                    <th class="px-6 py-4">Transaction ID</th>
                                    <th class="px-6 py-4">Student</th>
                                    <th class="px-6 py-4">Amount</th>
                                    <th class="px-6 py-4">Verification</th>
                                    <th class="px-6 py-4">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <template x-for="pay in payments" :key="pay.id">
                                    <tr class="hover:bg-blue-50/50 transition-colors">
                                        <td class="px-6 py-4 font-mono text-sm" x-text="pay.id.substring(0,8)"></td>
                                        <td class="px-6 py-4" x-text="pay.email"></td>
                                        <td class="px-6 py-4 font-bold text-gray-800" x-text="'₹' + pay.amount"></td>
                                        <td class="px-6 py-4">
                                            <span :class="pay.verified ? 'text-green-600' : 'text-red-600'" class="text-sm flex items-center">
                                                <i :class="pay.verified ? 'fa-circle-check' : 'fa-circle-xmark'" class="fa-solid mr-2"></i>
                                                <span x-text="pay.verified ? 'Verified' : 'Pending'"></span>
                                            </span>
                                        </td>
                                        <td class="px-6 py-4 text-sm">
                                            <button @click="verifyPayment(pay.id)" class="bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200 transition-all">Verify</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Post News Section -->
                <div x-show="activeTab === 'news'" class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border">
                    <form @submit.prevent="postNews">
                        <div class="mb-4">
                            <label class="block text-sm font-semibold mb-2">Headline</label>
                            <input type="text" x-model="newsForm.title" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-semibold mb-2">Content</label>
                            <textarea x-model="newsForm.content" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 h-32" required></textarea>
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">Publish Update</button>
                    </form>
                </div>

                <!-- Documents Section -->
                <div x-show="activeTab === 'docs'" class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border">
                    <div class="mb-8">
                        <h3 class="font-bold mb-4 border-b pb-2">Add New Resource</h3>
                        <form @submit.prevent="addDoc">
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Document Title</label>
                                    <input type="text" x-model="docForm.name" class="w-full px-4 py-2 border rounded-lg" required>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Resource URL</label>
                                    <input type="url" x-model="docForm.url" class="w-full px-4 py-2 border rounded-lg" placeholder="https://..." required>
                                </div>
                            </div>
                            <button type="submit" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold hover:bg-slate-900 shadow-md">Upload Link</button>
                        </form>
                    </div>
                    
                    <h3 class="font-bold mb-4">Existing Resources</h3>
                    <div class="space-y-3">
                        <template x-for="doc in resources" :key="doc.id">
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border">
                                <div class="flex items-center">
                                    <i class="fas fa-file-pdf text-red-500 mr-3 text-xl"></i>
                                    <span class="font-medium" x-text="doc.name"></span>
                                </div>
                                <button @click="deleteDoc(doc.id)" class="text-red-500 hover:text-red-700 transition-colors">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </template>
                    </div>
                </div>

            </main>
        </div>
    </template>

    <!-- Shared Components / Modals -->
    <div x-show="loading" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl flex items-center shadow-2xl">
            <div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mr-4"></div>
            <span class="font-bold text-gray-700">Processing...</span>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
