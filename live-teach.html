<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Panel | Era of MathAntics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        #instructor-meet iframe { border-radius: 1rem; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full text-white flex flex-col overflow-hidden">
    <!-- Batch Selection Overlay -->
    <div id="batch-overlay" class="fixed inset-0 z-[100] bg-gray-950 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-3xl max-w-md w-full shadow-2xl">
            <div class="flex items-center space-x-3 mb-6">
                <div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-video"></i></div>
                <h2 class="text-xl font-bold">Launch Live Studio</h2>
            </div>
            <p class="text-gray-400 text-sm mb-6">Which batch are you teaching today? Students in the selected batch will be notified.</p>
            <div id="batch-list" class="space-y-2 mb-8 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                <div class="animate-pulse text-gray-700 text-xs">Fetching active batches...</div>
            </div>
            <button id="launch-btn" disabled onclick="startLiveSession()" 
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-800 disabled:text-gray-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-900/20">
                GO LIVE NOW
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <div class="h-10 w-10 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-chalkboard-teacher text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Teaching Studio</h1>
                <p id="batch-info" class="text-xs text-gray-500">Live Session Dashboard</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center bg-gray-800 rounded-full px-3 py-1 border border-gray-700">
                <div class="h-2 w-2 bg-green-500 rounded-full mr-2"></div>
                <span class="text-xs text-gray-300">Server Stable</span>
            </div>
            <button onclick="endSession()" class="text-sm text-gray-400 hover:text-white transition hover:text-red-400">Exit Studio</button>
        </div>
    </header>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        <!-- Main Stream Control -->
        <div class="flex-1 flex flex-col space-y-4">
            <div id="instructor-meet" class="flex-1 bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
                <!-- Jitsi will load here -->
            </div>
            <!-- Teacher Toolbox -->
            <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                <div class="flex space-x-3">
                    <button class="bg-gray-800 hover:bg-gray-700 p-3 rounded-lg text-sm font-medium transition flex items-center"><i class="fas fa-file-upload mr-2"></i> Share PDF</button>
                    <button class="bg-gray-800 hover:bg-gray-700 p-3 rounded-lg text-sm font-medium transition flex items-center"><i class="fas fa-poll-h mr-2"></i> Create Poll</button>
                </div>
                <button onclick="endSession()" class="bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white px-6 py-2 rounded-lg font-bold transition">END SESSION</button>
            </div>
        </div>

        <!-- Moderation Sidebar -->
        <aside class="w-96 flex flex-col space-y-4">
            <!-- Student Chat -->
            <div class="flex-1 bg-gray-900 rounded-xl border border-gray-800 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/50">
                    <h3 class="font-bold text-sm tracking-wide">STUDENT INTERACTION</h3>
                    <span class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-0.5 rounded uppercase font-bold">Real-time</span>
                </div>
                <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm scrollbar-thin scrollbar-thumb-gray-800">
                    <!-- Messages -->
                </div>
                <div class="p-3 bg-gray-950">
                    <form id="chat-form" class="flex space-x-2">
                        <input type="text" id="chat-input" placeholder="Announce to class..." 
                            class="flex-1 bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-blue-500 outline-none">
                        <button class="bg-blue-600 px-4 py-2 rounded-lg"><i class="fas fa-paper-plane text-xs"></i></button>
                    </form>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDkrbfNKopAWj7ZA5fCrkjsOz_dsdMCmCs",
            authDomain: "era-of-mathantics-8b6d1.firebaseapp.com",
            projectId: "era-of-mathantics-8b6d1",
            storageBucket: "era-of-mathantics-8b6d1.firebasestorage.app",
            messagingSenderId: "521238168559",
            appId: "1:521238168559:web:83b3c06de5b28b1eac6c1a",
            databaseURL: "https://era-of-mathantics-8b6d1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const rtdb = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;
        let selectedBatchId = null;
        let selectedBatchName = "";
        let jitsiApi = null;

        async function init() {
            // Load batches immediately to avoid hanging UI
            loadBatches();

            try {
                const res = await fetch('/api/check-auth');
                const data = await res.json();
                if (!data.authenticated || data.role !== 'staff') {
                    window.location.href = '/index.html';
                    return;
                }
                currentUser = data;

                // Sign in anonymously for Realtime DB / Chat rules
                await auth.signInAnonymously();
                console.log("Firebase Session Established");
            } catch (err) {
                console.warn("Auth/Session Warning:", err.message);
            }
        }

        async function loadBatches() {
            const list = document.getElementById('batch-list');
            try {
                const response = await fetch('/api/get-batches', { signal: AbortSignal.timeout(10000) });
                if (!response.ok) throw new Error("API returned error status");
                
                const batches = await response.json();
                list.innerHTML = ''; // Clear the pulsing "Fetching" text

                if (!Array.isArray(batches) || batches.length === 0) {
                    list.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-folder-open text-3xl mb-3 block"></i>
                            <p class="text-sm">No batches found.</p>
                            <p class="text-[10px] mt-1">Check if batches are created in Manage Batches.</p>
                            <button onclick="loadBatches()" class="mt-4 text-blue-500 text-xs hover:underline">Retry</button>
                        </div>`;
                    return;
                }

                batches.forEach(batch => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-gray-800/50 border border-gray-700 rounded-xl cursor-pointer hover:border-blue-500 transition-all group animate-fade-in";
                    div.onclick = () => selectBatch(batch.id, batch.name, div);
                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-bold text-sm group-hover:text-blue-400 transition-colors">${batch.name}</p>
                                <p class="text-[10px] text-gray-500 uppercase tracking-wider">Class ${batch.classLevel} • ${batch.schedule}</p>
                            </div>
                            <i class="fas fa-chevron-right text-gray-700 group-hover:text-blue-500 text-xs"></i>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (error) {
                console.error("Error fetching batches:", error);
                list.innerHTML = `
                    <div class="p-4 bg-red-500/10 border border-red-500/20 text-red-500 text-xs rounded-xl text-center">
                        <i class="fas fa-exclamation-circle mb-2 block text-lg"></i>
                        <strong>Unable to load batches</strong><br>
                        <span class="opacity-70">${error.message === 'API returned error status' ? 'Server Error (500). Check Vercel Logs.' : error.message}</span><br>
                        <button onclick="loadBatches()" class="mt-3 bg-red-500 text-white px-4 py-1 rounded-lg font-bold">Retry Connection</button>
                    </div>`;
            }
        }

        function selectBatch(id, name, element) {
            selectedBatchId = id;
            selectedBatchName = name;
            document.querySelectorAll('#batch-list > div').forEach(el => el.classList.remove('border-blue-500', 'bg-blue-600/10'));
            element.classList.add('border-blue-500', 'bg-blue-600/10');
            document.getElementById('launch-btn').disabled = false;
        }

        async function startLiveSession() {
            if (!selectedBatchId) return;
            
            // Signal the Live state to students in RTDB
            await rtdb.ref(`liveSessions/${selectedBatchId}`).set({
                isLive: true,
                classTitle: selectedBatchName,
                startedAt: firebase.database.ServerValue.TIMESTAMP,
                instructor: currentUser.email
            });

            document.getElementById('batch-overlay').style.display = 'none';
            document.getElementById('batch-info').innerText = `Batch: ${selectedBatchName} | Active Instructor: ${currentUser.email}`;

            launchInstructorMedia();
            initStaffChat();
        }

        async function endSession() {
            if (!selectedBatchId) { window.location.href = '/staff.html'; return; }
            if (confirm("Are you sure you want to end the session? This will remove the LIVE status for students.")) {
                await rtdb.ref(`liveSessions/${selectedBatchId}`).remove();
                if (jitsiApi) jitsiApi.dispose();
                window.location.href = '/staff.html';
            }
        }

        function launchInstructorMedia() {
            const domain = 'meet.jit.si';
            const options = {
                roomName: `EraOfMathAntics_Live_${selectedBatchId}`,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#instructor-meet'),
                configOverwrite: {
                    startWithAudioMuted: false,
                    disableModeratorIndicator: false,
                    makeJsonRpcRequests: true,
                    prejoinPageEnabled: false
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                        'fms', 'hangup', 'profile', 'chat', 'recording',
                        'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                        'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                        'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
                        'security'
                    ],
                },
                userInfo: { email: currentUser.email, displayName: "Instructor" }
            };
            jitsiApi = new JitsiMeetExternalAPI(domain, options);
        }

        function initStaffChat() {
            const chatBox = document.getElementById('chat-box');
            const chatForm = document.getElementById('chat-form');
            const chatInput = document.getElementById('chat-input');

            db.collection('live_chats').doc(selectedBatchId).collection('messages')
                .orderBy('timestamp', 'asc')
                .limitToLast(100)
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const msg = change.doc.data();
                            const isStaff = msg.email === currentUser.email;
                            const div = document.createElement('div');
                            div.className = `p-2 rounded-lg ${isStaff ? 'bg-blue-600/10 border border-blue-600/20' : 'bg-gray-800'}`;
                            div.innerHTML = `
                                <div class="flex justify-between items-center mb-1">
                                    <span class="font-bold text-[10px] text-blue-400 uppercase">${msg.email.split('@')[0]}</span>
                                </div>
                                <p class="text-gray-300 leading-relaxed">${msg.text}</p>
                            `;
                            chatBox.appendChild(div);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    });
                });

            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const text = chatInput.value.trim();
                if (!text) return;
                chatInput.value = '';
                await db.collection('live_chats').doc(selectedBatchId).collection('messages').add({
                    text: text,
                    email: currentUser.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
        }
        init();
    </script>
</body>
</html>
