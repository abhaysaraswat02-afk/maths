<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Era of MathAntics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-['Inter']" x-data="staffPortal()">

    <!-- Login Section -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex flex-col items-center justify-center bg-slate-900 text-white p-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
            <h2 class="text-xl font-bold">Verifying Staff Access...</h2>
            <p class="text-slate-400 mt-2 text-sm">If you are not redirected, please <a href="index.html" class="text-blue-400 underline">login here</a>.</p>
            <div x-show="error" class="mt-4 p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-red-500 text-xs" x-text="error"></div>
        </div>
    </template>

    <!-- Dashboard Section -->
    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <!-- Sidebar -->
            <aside class="w-64 bg-slate-900 text-white hidden md:block">
                <div class="p-6">
                    <h2 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-red-400 bg-clip-text text-transparent">
                        Admin Dashboard
                    </h2>
                </div>
                <nav class="mt-6">
                    <button @click="activeTab = 'admissions'" :class="activeTab === 'admissions' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-user-graduate w-6"></i> Admissions
                    </button>
                    <button @click="activeTab = 'news'" :class="activeTab === 'news' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-newspaper w-6"></i> Post News
                    </button>
                    <button @click="activeTab = 'docs'" :class="activeTab === 'docs' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-folder-open w-6"></i> Resources
                    </button>
                    <button @click="activeTab = 'scores'" :class="activeTab === 'scores' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-chart-bar w-6"></i> Test Scores
                    </button>
                </nav>
                <div class="absolute bottom-0 w-64 p-6">
                    <button @click="logout" class="text-slate-400 hover:text-white flex items-center transition-colors">
                        <i class="fas fa-sign-out-alt mr-2"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-8">
                <header class="flex justify-between items-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800" x-text="tabTitle()"></h1>
                    <button @click="exportData" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center text-sm transition-all shadow-md">
                        <i class="fas fa-download mr-2"></i> Export Data
                    </button>
                </header>

                <!-- Admissions Section -->
                <div x-show="activeTab === 'admissions'" class="space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b text-gray-600 uppercase text-xs font-bold">
                                <tr>
                                    <th class="px-6 py-4">Student Name</th>
                                    <th class="px-6 py-4">Email</th>
                                    <th class="px-6 py-4">Class</th>
                                    <th class="px-6 py-4">Date</th>
                                    <th class="px-6 py-4">Admission</th>
                                    <th class="px-6 py-4">Access</th>
                                    <th class="px-6 py-4">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <template x-for="item in admissions" :key="item.id">
                                    <tr :class="item.isBlocked ? 'bg-red-50 opacity-75' : 'hover:bg-blue-50/50'" class="transition-colors">
                                        <td class="px-6 py-4 font-medium" x-text="item.name || 'Unnamed'"></td>
                                        <td class="px-6 py-4 text-gray-600 text-sm font-mono" x-text="item.email || 'N/A'"></td>
                                        <td class="px-6 py-4 text-gray-600" x-text="item.studentClass || 'N/A'"></td>
                                        <td class="px-6 py-4 text-gray-500 text-sm" x-text="formatDate(item.timestamp || item.createdAt)"></td>
                                        <td class="px-6 py-4">
                                            <span :class="item.status === 'Approved' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'" 
                                                class="px-2 py-1 rounded-full text-xs font-semibold" x-text="item.status"></span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span :class="item.isBlocked ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'" 
                                                class="px-2 py-1 rounded-full text-xs font-semibold" x-text="item.isBlocked ? 'Blocked' : 'Active'"></span>
                                        </td>
                                        <td class="px-6 py-4 space-x-2 flex">
                                            <button @click="approveAdmission(item.id)" x-show="item.status !== 'Approved'" class="text-blue-600 hover:underline font-semibold text-sm">Approve</button>
                                            <button @click="toggleBlockStudent(item.id, item.email, item.isBlocked)" :class="item.isBlocked ? 'text-green-600 hover:text-green-700' : 'text-red-600 hover:text-red-700'" class="font-semibold text-sm transition-colors" x-text="item.isBlocked ? 'Unblock' : 'Block'"></button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Post News Section -->
                <div x-show="activeTab === 'news'" class="space-y-8">
                    <!-- Post News Form -->
                    <div class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border">
                        <h3 class="text-lg font-bold mb-6">Post New Update</h3>
                        <form @submit.prevent="postNews">
                            <div class="mb-4">
                                <label class="block text-sm font-semibold mb-2">Headline</label>
                                <input type="text" x-model="newsForm.title" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-semibold mb-2">Content</label>
                                <textarea x-model="newsForm.content" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 h-32" required></textarea>
                            </div>
                            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">Publish Update</button>
                        </form>
                    </div>

                    <!-- News List -->
                    <div class="bg-white p-8 rounded-xl shadow-sm border">
                        <h3 class="text-lg font-bold mb-6">Previous News</h3>
                        <div x-show="newsList.length === 0" class="text-center py-12 text-gray-500">
                            <p class="text-sm">No news posted yet.</p>
                        </div>
                        <div class="space-y-3">
                            <template x-for="news in newsList" :key="news.id">
                                <div class="p-4 bg-slate-50 rounded-lg border flex items-start justify-between hover:bg-slate-100 transition-colors">
                                    <div class="flex-1">
                                        <h4 class="font-bold text-gray-800" x-text="news.title"></h4>
                                        <p class="text-sm text-gray-600 mt-1 line-clamp-2" x-text="news.content"></p>
                                        <p class="text-xs text-gray-400 mt-2" x-text="formatDate(news.timestamp)"></p>
                                    </div>
                                    <button @click="deleteNews(news.id)" class="ml-4 text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition-colors flex-shrink-0">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Documents Section -->
                <div x-show="activeTab === 'docs'" class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border">
                    <div class="mb-8">
                        <h3 class="font-bold mb-4 border-b pb-2">Add New Resource</h3>
                        <form @submit.prevent="addDoc">
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Document Title</label>
                                    <input type="text" x-model="docForm.name" class="w-full px-4 py-2 border rounded-lg" required>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Resource URL</label>
                                    <input type="url" x-model="docForm.url" class="w-full px-4 py-2 border rounded-lg" placeholder="https://..." required>
                                </div>
                            </div>
                            <button type="submit" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold hover:bg-slate-900 shadow-md">Upload Link</button>
                        </form>
                    </div>
                    
                    <h3 class="font-bold mb-4">Existing Resources</h3>
                    <div class="space-y-3">
                        <template x-for="doc in resources" :key="doc.id">
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border">
                                <div class="flex items-center">
                                    <i class="fas fa-file-pdf text-red-500 mr-3 text-xl"></i>
                                    <span class="font-medium" x-text="doc.name"></span>
                                </div>
                                <button @click="deleteDoc(doc.id)" class="text-red-500 hover:text-red-700 transition-colors">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Test Scores Section -->
                <div x-show="activeTab === 'scores'" class="space-y-8">
                    <!-- Enter Test Scores Form -->
                    <div class="max-w-3xl bg-white p-8 rounded-xl shadow-sm border">
                        <h3 class="text-lg font-bold mb-6">Enter Offline Test Score</h3>
                        <form @submit.prevent="submitTestScore">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Student Email</label>
                                    <input type="email" x-model="testScoreForm.studentEmail" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="student@example.com" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Test Name</label>
                                    <input type="text" x-model="testScoreForm.testName" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Chapter 5 Test" required>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Score Obtained</label>
                                    <input type="number" x-model.number="testScoreForm.score" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" min="0" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Total Marks</label>
                                    <input type="number" x-model.number="testScoreForm.total" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" min="1" value="100" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Percentage</label>
                                    <input type="number" x-model.number="testScoreForm.percentage" class="w-full px-4 py-2 border rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" readonly :value="testScoreForm.total && testScoreForm.score ? Math.round((testScoreForm.score / testScoreForm.total) * 100) : 0">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2">Date of Test</label>
                                <input type="date" x-model="testScoreForm.date" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <button type="submit" class="mt-6 w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md transition-all">Submit Test Score</button>
                        </form>
                    </div>

                    <!-- Recent Submissions -->
                    <div class="bg-white p-8 rounded-xl shadow-sm border">
                        <h3 class="text-lg font-bold mb-6">Recent Score Submissions</h3>
                        <div x-show="recentScores.length === 0" class="text-center py-12 text-gray-500">
                            <p class="text-sm">No scores submitted yet.</p>
                        </div>
                        <div class="space-y-3">
                            <template x-for="score in recentScores" :key="score.id">
                                <div class="p-4 bg-slate-50 rounded-lg border hover:bg-slate-100 transition-colors">
                                    <div class="flex items-start justify-between">
                                        <div class="flex-1">
                                            <h4 class="font-bold text-gray-800" x-text="score.studentEmail"></h4>
                                            <p class="text-sm text-gray-600 mt-1" x-text="score.testName"></p>
                                            <div class="flex items-center gap-4 mt-3">
                                                <span class="text-sm font-semibold text-blue-600" x-text="'Score: ' + score.score + '/' + score.total"></span>
                                                <span class="text-sm font-semibold" :class="score.percentage >= 80 ? 'text-green-600' : score.percentage >= 60 ? 'text-yellow-600' : 'text-red-600'" x-text="score.percentage + '%'"></span>
                                            </div>
                                            <p class="text-xs text-gray-400 mt-2" x-text="'Submitted: ' + formatDate(score.timestamp)"></p>
                                        </div>
                                        <button @click="deleteScore(score.id)" class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition-colors flex-shrink-0">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </template>

    <!-- Shared Components / Modals -->
    <div x-show="loading" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl flex items-center shadow-2xl">
            <div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mr-4"></div>
            <span class="font-bold text-gray-700">Processing...</span>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
