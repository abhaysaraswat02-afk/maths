<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Era of MathAntics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        fetch('/api/check-auth').then(res => res.json()).then(data => {
            if (!data.authenticated || data.role !== 'staff') {
                window.location.href = 'index.html';
            }
        }).catch(() => window.location.href = 'index.html');
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="welcomeBackAnimation.css">
    <link rel="stylesheet" href="gamification.css">
    <link rel="stylesheet" href="gamification-personality.css">
    <link rel="stylesheet" href="effects-3d-enhanced.css">
    <link rel="stylesheet" href="features-new.css">
    <link rel="stylesheet" href="firstVisitorCelebration.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Enhanced Hover 3D for Staff Portal */
        .hover-3d {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s ease;
            transform-style: preserve-3d;
            box-shadow: 0 8px 16px -5px rgba(0,0,0,0.08); /* Initial subtle shadow */
        }
        .hover-3d:hover {
            transform: perspective(1000px) rotateX(3deg) translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
            transform: perspective(1000px) rotateX(2deg) translateY(-7px); /* Slightly more lift and rotation */
            box-shadow: 0 18px 36px -8px rgba(0,0,0,0.15); /* Stronger shadow */
        }

        /* Global 3D Button Press Effect */
        .button-3d-press {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.2); /* Initial depth */
        }
        .button-3d-press:hover {
            transform: translateY(-2px) translateZ(5px);
            box-shadow: 0 6px 0px rgba(0, 0, 0, 0.25);
        }
        .button-3d-press:active {
            transform: translateY(2px) translateZ(0px);
            box-shadow: 0 2px 0px rgba(0, 0, 0, 0.15);
        }

        /* Beautiful Loading Spinner with Multiple Effects */
        .loading-3d-spinner {
            animation: spin3d 2s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55), pulse-glow 2s infinite ease-in-out;
            transform-style: preserve-3d;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }
        @keyframes spin3d {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            50% { transform: rotateY(180deg) rotateX(90deg); }
            100% { transform: rotateY(360deg) rotateX(180deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(37, 99, 235, 0.5), inset 0 0 5px rgba(37, 99, 235, 0.3); }
            50% { box-shadow: 0 0 25px rgba(59, 130, 246, 0.8), inset 0 0 10px rgba(59, 130, 246, 0.5); }
        }
        
        /* Processing Modal Styles */
        .processing-modal {
            animation: fadeInStay 0.3s ease-out;
        }
        .processing-content {
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .processing-spinner {
            animation: spinSmooth 1.5s linear infinite, scalePulse 2s ease-in-out infinite;
        }
        @keyframes fadeInStay {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes spinSmooth {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes scalePulse {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.4)); }
            50% { filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.7)); }
        }
    </style>
</head>
<body class="bg-slate-50 font-['Inter']" x-data="staffPortal()" x-init="init()">

    <!-- Login Section -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex flex-col items-center justify-center bg-slate-900 text-white p-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
            <div class="rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4 loading-3d-spinner"></div>
            <h2 class="text-xl font-bold">Verifying Staff Access...</h2>
            <p class="text-slate-400 mt-2 text-sm">If you are not redirected, please <a href="index.html" class="text-blue-400 underline">login here</a>.</p>
            <div x-show="error" class="mt-4 p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-red-500 text-xs" x-text="error"></div>
        </div>
    </template>

    <!-- Dashboard Section -->
    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <!-- Sidebar -->
            <aside class="w-64 bg-slate-900 text-white hidden md:block">
                <div class="p-6">
                    <h2 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-red-400 bg-clip-text text-transparent">
                        Admin Dashboard
                    </h2>
                </div>
                <nav class="mt-6">
                    <button @click="activeTab = 'admissions'" :class="activeTab === 'admissions' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-user-graduate w-6"></i> Admissions
                    </button>
                    <button @click="activeTab = 'news'" :class="activeTab === 'news' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-newspaper w-6"></i> Post News
                    </button>
                    <button @click="activeTab = 'docs'" :class="activeTab === 'docs' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-folder-open w-6"></i> Resources
                    </button>
                    <button @click="activeTab = 'scores'" :class="activeTab === 'scores' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-chart-bar w-6"></i> Test Scores
                    </button>
                    <button @click="activeTab = 'manage-staff'" :class="activeTab === 'manage-staff' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center px-6 py-4 transition-colors">
                        <i class="fas fa-users-cog w-6"></i> Manage Staff
                    </button>
                </nav>
                <div class="absolute bottom-0 w-64 p-6">
                    <button @click="logout" class="text-slate-400 hover:text-white flex items-center transition-colors">
                        <i class="fas fa-sign-out-alt mr-2"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-8">
                <header class="flex justify-between items-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800" x-text="tabTitle()"></h1>
                    <button @click="exportData" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center text-sm transition-all shadow-md">
                    <button @click="exportData" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center text-sm transition-all shadow-md button-3d-press">
                        <i class="fas fa-download mr-2"></i> Export Data
                    </button>
                </header>

                <!-- Admissions Section -->
                <div x-show="activeTab === 'admissions'" class="space-y-6">
                    <div class="flex flex-col md:flex-row gap-4 mb-4">
                        <div class="relative flex-1">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" x-model="admissionSearch" placeholder="Search by name or email..." class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <select x-model="classFilter" class="px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-semibold text-gray-700">
                            <option value="All">All Classes</option>
                            <option value="Class 9">Class 9</option>
                            <option value="Class 10">Class 10</option>
                            <option value="Class 11">Class 11</option>
                            <option value="Class 12">Class 12</option>
                        </select>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b text-gray-600 uppercase text-xs font-bold">
                                <tr>
                                    <th class="px-6 py-4">Student Name</th>
                                    <th class="px-6 py-4">Email</th>
                                    <th class="px-6 py-4">Class</th>
                                    <th class="px-6 py-4">Date</th>
                                    <th class="px-6 py-4">Admission</th>
                                    <th class="px-6 py-4">Access</th>
                                    <th class="px-6 py-4">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <template x-for="item in filteredAdmissions" :key="item.id">
                                    <tr :class="item.isBlocked ? 'bg-red-50 opacity-75' : 'hover:bg-blue-50/50'" class="transition-colors">
                                        <td class="px-6 py-4 font-medium" x-text="item.name || 'Unnamed'"></td>
                                        <td class="px-6 py-4 text-gray-600 text-sm font-mono" x-text="item.email || 'N/A'"></td>
                                        <td class="px-6 py-4 text-gray-600" x-text="item.studentClass || 'N/A'"></td>
                                        <td class="px-6 py-4 text-gray-500 text-sm" x-text="formatDate(item.timestamp || item.createdAt)"></td>
                                        <td class="px-6 py-4">
                                            <span :class="item.status === 'Approved' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'" 
                                                class="px-2 py-1 rounded-full text-xs font-semibold" x-text="item.status"></span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span :class="item.isBlocked ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'" 
                                                class="px-2 py-1 rounded-full text-xs font-semibold" x-text="item.isBlocked ? 'Blocked' : 'Active'"></span>
                                        </td>
                                        <td class="px-6 py-4 space-x-2 flex">
                                            <button @click="approveAdmission(item.id)" x-show="item.status !== 'Approved'" class="text-blue-600 hover:underline font-semibold text-sm">Approve</button>
                                            <button @click="toggleBlockStudent(item.id, item.email, item.isBlocked)" :class="item.isBlocked ? 'text-green-600 hover:text-green-700' : 'text-red-600 hover:text-red-700'" class="font-semibold text-sm transition-colors" x-text="item.isBlocked ? 'Unblock' : 'Block'"></button>
                                            <button @click="deleteStudent(item.id)" class="text-red-600 hover:text-red-800 font-semibold text-sm transition-colors">Delete</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Post News Section -->
                <div x-show="activeTab === 'news'" class="space-y-8">
                    <!-- Post News Form -->
                    <div class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border hover-3d">
                        <h3 class="text-lg font-bold mb-6">Post New Update</h3>
                        <form @submit.prevent="postNews">
                            <div class="mb-4">
                                <label class="block text-sm font-semibold mb-2">Headline</label>
                                <input type="text" x-model="newsForm.title" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-semibold mb-2">Content</label>
                                <textarea x-model="newsForm.content" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 h-32" required></textarea>
                            </div>
                            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">Publish Update</button>
                        </form>
                    </div>

                    <!-- News List -->
                    <div class="bg-white p-8 rounded-xl shadow-sm border">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold">Previous News</h3>
                            <div class="relative w-64">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="text" x-model="newsSearch" placeholder="Search news..." class="w-full pl-10 pr-4 py-1.5 border rounded-lg text-sm outline-none">
                            </div>
                        </div>
                        <div x-show="filteredNews.length === 0" class="text-center py-12 text-gray-500">
                            <p class="text-sm">No news posted yet.</p>
                        </div>
                        <div class="space-y-3">
                            <template x-for="news in filteredNews" :key="news.id">
                                <div class="p-4 bg-slate-50 rounded-lg border flex items-start justify-between hover:bg-slate-100 transition-colors">
                                    <div class="flex-1">
                                        <h4 class="font-bold text-gray-800" x-text="news.title"></h4>
                                        <p class="text-sm text-gray-600 mt-1 line-clamp-2" x-text="news.content"></p>
                                        <p class="text-xs text-gray-400 mt-2" x-text="formatDate(news.timestamp)"></p>
                                    </div>
                                    <button @click="deleteNews(news.id)" class="ml-4 text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition-colors flex-shrink-0">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Documents Section -->
                <div x-show="activeTab === 'docs'" class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border hover-3d">
                    <div class="mb-8">
                        <h3 class="font-bold mb-4 border-b pb-2">Add New Resource</h3>
                        <form @submit.prevent="addDoc">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Document Title</label>
                                    <input type="text" x-model="docForm.name" class="w-full px-4 py-2 border rounded-lg" required>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Resource URL</label>
                                    <input type="url" x-model="docForm.url" class="w-full px-4 py-2 border rounded-lg" placeholder="https://..." required>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Target Class</label>
                                    <select x-model="docForm.classGrade" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="All">All Classes</option>
                                        <option value="Class 9">Class 9</option>
                                        <option value="Class 10">Class 10</option>
                                        <option value="Class 11">Class 11</option>
                                        <option value="Class 12">Class 12</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold hover:bg-slate-900 shadow-md">Upload Link</button>
                        </form>
                    </div>
                    
                    <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-3">
                        <h3 class="font-bold">Existing Resources</h3>
                        <div class="flex gap-2">
                            <select x-model="classFilter" class="px-3 py-1.5 border rounded-lg text-xs font-bold outline-none">
                                <option value="All">Filter by Class</option>
                                <option value="Class 9">Class 9</option>
                                <option value="Class 10">Class 10</option>
                                <option value="Class 11">Class 11</option>
                                <option value="Class 12">Class 12</option>
                            </select>
                            <div class="relative">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                                <input type="text" x-model="resourceSearch" placeholder="Search..." class="pl-8 pr-3 py-1.5 border rounded-lg text-xs outline-none w-32 md:w-44">
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <template x-for="doc in filteredResources" :key="doc.id">
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border">
                                <div class="flex items-center gap-2">
                                    <i class="fas fa-file-pdf text-red-500 mr-3 text-xl"></i>
                                    <span class="font-medium" x-text="doc.name"></span>
                                </div>
                                <button @click="deleteDoc(doc.id)" class="text-red-500 hover:text-red-700 transition-colors">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Test Scores Section -->
                <div x-show="activeTab === 'scores'" class="space-y-8">
                    <!-- Enter Test Scores Form -->
                    <div class="max-w-3xl bg-white p-8 rounded-xl shadow-sm border hover-3d">
                        <h3 class="text-lg font-bold mb-6">Enter Offline Test Score</h3>
                        <form @submit.prevent="submitTestScore">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Student Email</label>
                                    <input type="email" x-model="testScoreForm.studentEmail" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="student@example.com" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Test Name</label>
                                    <input type="text" x-model="testScoreForm.testName" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Chapter 5 Test" required>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Score Obtained</label>
                                    <input type="number" x-model.number="testScoreForm.score" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" min="0" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Total Marks</label>
                                    <input type="number" x-model.number="testScoreForm.total" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" min="1" value="100" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Percentage</label>
                                    <input type="number" x-model.number="testScoreForm.percentage" class="w-full px-4 py-2 border rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" readonly :value="testScoreForm.total && testScoreForm.score ? Math.round((testScoreForm.score / testScoreForm.total) * 100) : 0">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2">Date of Test</label>
                                <input type="date" x-model="testScoreForm.date" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <button type="submit" class="mt-6 w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md transition-all">Submit Test Score</button>
                        </form>
                    </div>

                    <!-- Recent Submissions -->
                    <div class="bg-white p-8 rounded-xl shadow-sm border">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold">Recent Score Submissions</h3>
                            <div class="relative w-64">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="text" x-model="scoreSearch" placeholder="Search student email..." class="w-full pl-10 pr-4 py-1.5 border rounded-lg text-sm outline-none">
                            </div>
                        </div>
                        <div x-show="filteredScores.length === 0" class="text-center py-12 text-gray-500">
                            <p class="text-sm">No scores submitted yet.</p>
                        </div>
                        <div class="space-y-3">
                            <template x-for="score in filteredScores" :key="score.id">
                                <div class="p-4 bg-slate-50 rounded-lg border hover:bg-slate-100 transition-colors">
                                    <div class="flex items-start justify-between">
                                        <div class="flex-1">
                                            <h4 class="font-bold text-gray-800" x-text="score.studentEmail"></h4>
                                            <p class="text-sm text-gray-600 mt-1" x-text="score.testName"></p>
                                            <div class="flex items-center gap-4 mt-3">
                                                <span class="text-sm font-semibold text-blue-600" x-text="'Score: ' + score.score + '/' + score.total"></span>
                                                <span class="text-sm font-semibold" :class="score.percentage >= 80 ? 'text-green-600' : score.percentage >= 60 ? 'text-yellow-600' : 'text-red-600'" x-text="score.percentage + '%'"></span>
                                            </div>
                                            <p class="text-xs text-gray-400 mt-2" x-text="'Submitted: ' + formatDate(score.timestamp)"></p>
                                        </div>
                                        <button @click="deleteScore(score.id)" class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition-colors flex-shrink-0">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Manage Staff Section -->
                <div x-show="activeTab === 'manage-staff'" class="space-y-8">
                    <div class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border hover-3d">
                        <h3 class="text-lg font-bold mb-6">Add New Staff Member</h3>
                        <p class="text-xs text-gray-500 mb-6 italic">Adding a staff member by their Gmail grants them instant access to this portal via OTP login.</p>
                        <form @submit.prevent="addStaff">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Full Name</label>
                                    <input type="text" x-model="staffForm.name" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Role/Title</label>
                                    <input type="text" x-model="staffForm.role" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Math Head" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-semibold mb-2">Official Gmail Address</label>
                                <input type="email" x-model="staffForm.email" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">Add Staff Member</button>
                        </form>
                    </div>

                    <div class="bg-white p-8 rounded-xl shadow-sm border">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold">Authorized Team</h3>
                            <div class="relative w-64">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="text" x-model="staffSearch" placeholder="Search team..." class="w-full pl-10 pr-4 py-1.5 border rounded-lg text-sm outline-none">
                            </div>
                        </div>
                        <div class="bg-white rounded-xl border overflow-hidden">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 border-b text-gray-600 uppercase text-xs font-bold">
                                    <tr>
                                        <th class="px-6 py-4">Name</th>
                                        <th class="px-6 py-4">Email</th>
                                        <th class="px-6 py-4">Role</th>
                                        <th class="px-6 py-4">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y">
                                    <!-- Hardcoded Super Admins (Protected) -->
                                    <template x-for="email in staffEmails">
                                        <tr class="bg-blue-50/30">
                                            <td class="px-6 py-4 font-medium italic">Super Admin</td>
                                            <td class="px-6 py-4 text-gray-600 text-sm font-mono" x-text="email"></td>
                                            <td class="px-6 py-4 text-blue-600 font-bold text-xs uppercase">Owner</td>
                                            <td class="px-6 py-4 text-gray-400 text-xs italic">System Protected</td>
                                        </tr>
                                    </template>
                                    <!-- Dynamic Staff -->
                                    <template x-for="staff in filteredStaff" :key="staff.id">
                                        <tr class="hover:bg-slate-50">
                                            <td class="px-6 py-4 font-medium" x-text="staff.name"></td>
                                            <td class="px-6 py-4 text-gray-600 text-sm font-mono" x-text="staff.email"></td>
                                            <td class="px-6 py-4 text-gray-600" x-text="staff.role"></td>
                                            <td class="px-6 py-4">
                                                <button @click="deleteStaff(staff.id)" class="text-red-500 hover:text-red-700">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </template>

    <!-- Shared Components / Modals -->
    <div x-show="loading" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 processing-modal">
        <div class="bg-white p-8 rounded-2xl flex flex-col items-center shadow-2xl processing-content" style="min-width: 220px;">
            <div class="rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4 processing-spinner"></div>
            <span class="font-bold text-gray-700 text-center tracking-wide">Processing...</span>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>

    <!-- Welcome Back Animation & First Visitor Celebration Scripts -->
    <script src="welcomeBackAnimation.js"></script>
    <script src="firstVisitorCelebration.js"></script>

    <script src="gamification.js"></script>
    <script src="gamification-component.js"></script>
    <script src="effects-3d-enhanced.js" defer></script>
    <div id="chat-bubble">
      <button id="chat-bubble-btn" title="Ask MathBot">💬<span class="badge-dot"></span></button>
      <div id="chat-panel-popup">
        <div class="chat-header">🤖 MathBot Staff Help</div>
        <div class="chat-msgs"></div>
        <div class="chat-input-row">
          <input type="text" placeholder="Ask about maths…" />
          <button>➤</button>
        </div>
      </div>
    </div>
    <div id="quote-toast"><div class="quote-icon">📚</div><div class="quote-text"></div><div class="quote-author"></div></div>
    <div id="achievement-popup"><div class="achievement-popup-inner"><div class="achievement-icon">⭐</div><div class="achievement-text"><strong>Well done!</strong><span>Keep going</span><div><span class="achievement-badge-label">Nice Work</span></div></div></div></div>
    <script src="features-new.js" defer></script>
</body>
</html>
