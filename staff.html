<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Arrow of Mathematics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        fetch('/api/check-auth').then(res => res.json()).then(data => {
            if (!data.authenticated || data.role !== 'staff') window.location.href = 'index.html';
        }).catch(() => window.location.href = 'index.html');
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Socket.IO Client -->
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="welcomeBackAnimation.css">
    <link rel="stylesheet" href="gamification.css">
    <link rel="stylesheet" href="gamification-personality.css">
    <link rel="stylesheet" href="effects-3d-enhanced.css">
    <link rel="stylesheet" href="features-new.css">
    <link rel="stylesheet" href="firstVisitorCelebration.css">
    <style>
        :root {
            --gold:#FFD700;--gold2:#FFA500;--deep:#0a0a1a;--deep2:#0d0d2b;
            --accent:#00f5ff;--accent2:#7b2fff;--white:#ffffff;
            --glass:rgba(255,255,255,0.06);--red:#ff3a3a;--green:#00e676;
        }
        body { background:var(--deep) !important;color:var(--white) !important;cursor:none;font-family:'Inter',sans-serif; }
        .cursor{width:18px;height:18px;border:2px solid var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99999;transition:transform 0.15s ease;mix-blend-mode:difference;}
        .cursor-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99999;}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
        ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--deep2);}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
        .card-staff{background:var(--glass);border:1px solid rgba(255,215,0,0.2);border-radius:16px;transition:all 0.3s;}
        .card-staff:hover{border-color:rgba(255,215,0,0.35);transform:translateY(-2px);}
        [x-cloak]{display:none !important;}

        /* ── LIVE CLASS CONTROLS ── */
        .live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,58,58,0.15);border:1px solid rgba(255,58,58,0.4);color:var(--red);padding:4px 12px;border-radius:50px;font-size:0.7rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
        .live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:live-pulse 1.2s ease-in-out infinite;}
        @keyframes live-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,58,58,0.4);}50%{box-shadow:0 0 0 8px transparent;}}

        /* ── LIVE TEACHER CONTROL PANEL ── */
        #live-control-panel{position:fixed;inset:0;z-index:200;background:var(--deep);display:flex;flex-direction:column;}
        .ctrl-header{background:rgba(10,10,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,0.1);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
        .ctrl-layout{flex:1;display:flex;overflow:hidden;}
        .ctrl-stream{flex:1;display:flex;flex-direction:column;background:#000;align-items:center;justify-content:center;position:relative;}
        .ctrl-sidebar{width:340px;display:flex;flex-direction:column;background:rgba(13,13,43,0.95);border-left:1px solid rgba(255,215,0,0.1);flex-shrink:0;overflow-y:auto;}
        .ctrl-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:0.8rem;font-weight:700;cursor:pointer;border:1px solid rgba(255,215,0,0.2);background:rgba(255,255,255,0.05);color:var(--white);transition:all 0.2s;}
        .ctrl-btn:hover{background:rgba(255,215,0,0.1);border-color:rgba(255,215,0,0.4);}
        .ctrl-btn.danger{background:rgba(255,58,58,0.15);border-color:rgba(255,58,58,0.4);color:var(--red);}
        .ctrl-btn.success{background:rgba(0,230,118,0.1);border-color:rgba(0,230,118,0.4);color:var(--green);}
        .chat-msg{background:rgba(255,255,255,0.05);border-radius:10px;padding:8px 12px;border-left:3px solid rgba(255,215,0,0.3);font-size:0.82rem;margin-bottom:8px;animation:msgSlide 0.2s ease;}
        .chat-msg.teacher{border-left-color:var(--gold);background:rgba(255,215,0,0.07);}
        @keyframes msgSlide{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .student-chip{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:6px;font-size:0.82rem;}
        .hand-chip{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.3);}

        /* ── TABLE STYLES ── */
        .data-table{width:100%;border-collapse:separate;border-spacing:0;}
        .data-table thead th{background:rgba(255,215,0,0.05);color:rgba(255,255,255,0.5);font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:12px 16px;border-bottom:1px solid rgba(255,215,0,0.1);}
        .data-table tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.2s;}
        .data-table tbody tr:hover{background:rgba(255,215,0,0.04);}
        .data-table tbody td{padding:12px 16px;font-size:0.85rem;}
        .status-pill{padding:3px 10px;border-radius:50px;font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
        .pill-green{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
        .pill-yellow{background:rgba(255,215,0,0.1);color:var(--gold);border:1px solid rgba(255,215,0,0.3);}
        .pill-red{background:rgba(255,58,58,0.1);color:var(--red);border:1px solid rgba(255,58,58,0.3);}

        /* ── FORM STYLES ── */
        .form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:10px 14px;color:var(--white);font-size:0.9rem;outline:none;transition:border-color 0.2s;}
        .form-input:focus{border-color:rgba(255,215,0,0.5);}
        .form-input::placeholder{color:rgba(255,255,255,0.3);}
        .form-input option{background:var(--deep2);}
        .form-label{display:block;font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);margin-bottom:6px;}
        .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--deep);font-weight:900;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:0.85rem;transition:all 0.2s;}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,215,0,0.3);}
        .btn-danger{background:rgba(255,58,58,0.15);color:var(--red);border:1px solid rgba(255,58,58,0.3);font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.8rem;transition:all 0.2s;}
        .btn-danger:hover{background:rgba(255,58,58,0.25);}
    </style>
</head>
<body x-data="staffPortal()" x-init="init()" x-cloak>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>
    <canvas id="particles"></canvas>

    <!-- ════════════════════════════════════════════════════════
         LIVE CLASS TEACHER CONTROL PANEL
    ════════════════════════════════════════════════════════ -->
    <div id="live-control-panel" x-show="liveCtrl.active" x-cloak style="display:none;">
        <!-- Header -->
        <div class="ctrl-header">
            <div class="flex items-center gap-3">
                <span class="live-badge"><span class="live-dot"></span> LIVE</span>
                <span class="font-bold" x-text="liveCtrl.batchName"></span>
                <span class="text-xs opacity-40" x-text="liveCtrl.duration"></span>
                <span class="text-xs" style="color:var(--gold);">👥 <span x-text="liveCtrl.studentCount"></span></span>
            </div>
            <div class="flex items-center gap-2">
                <button @click="shareLiveResource()" class="ctrl-btn">
                    <i class="fas fa-paperclip"></i> Share Resource
                </button>
                <button @click="toggleChatMute()" class="ctrl-btn" :class="liveCtrl.chatMuted ? 'danger' : ''">
                    <i class="fas" :class="liveCtrl.chatMuted ? 'fa-comment-slash' : 'fa-comments'"></i>
                    <span x-text="liveCtrl.chatMuted ? 'Unmute Chat' : 'Mute Chat'"></span>
                </button>
                <button @click="stopLiveClass()" class="ctrl-btn danger">
                    <i class="fas fa-stop-circle"></i> End Class
                </button>
            </div>
        </div>

        <!-- Layout -->
        <div class="ctrl-layout">
            <!-- Stream Preview (Teacher's own stream info) -->
            <div class="ctrl-stream">
                <div class="text-center p-8">
                    <div style="font-size:4rem;">📡</div>
                    <h3 class="text-2xl font-black mt-4" style="color:var(--gold);">You are LIVE!</h3>
                    <p class="opacity-60 mt-2 text-sm">Students can see your screen/camera via the stream key below.</p>
                    <div class="mt-6 p-4 rounded-xl text-left" style="background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.2);max-width:400px;margin:24px auto 0;">
                        <p class="text-xs font-bold uppercase opacity-40 mb-2">Stream Key (for OBS / Screen Share)</p>
                        <code class="text-sm font-mono" style="color:var(--accent);" x-text="liveCtrl.streamKey || 'Generated on start'"></code>
                    </div>

                    <!-- Live Poll Creator -->
                    <div class="mt-8 p-6 rounded-2xl text-left" style="background:var(--glass);border:1px solid rgba(255,215,0,0.2);max-width:400px;margin:24px auto 0;">
                        <h4 class="font-bold mb-4" style="color:var(--gold);">📊 Launch a Quick Poll</h4>
                        <div x-show="!liveCtrl.activePoll">
                            <input class="form-input mb-3" x-model="pollForm.question" placeholder="Poll question...">
                            <template x-for="(opt, i) in pollForm.options" :key="i">
                                <input class="form-input mb-2" x-model="pollForm.options[i]" :placeholder="'Option ' + (i+1)">
                            </template>
                            <button @click="launchPoll()" class="btn-primary w-full mt-2"><i class="fas fa-poll mr-2"></i>Launch Poll</button>
                        </div>
                        <div x-show="liveCtrl.activePoll" class="text-center">
                            <p class="font-bold opacity-70" x-text="'Poll active: ' + liveCtrl.activePoll?.question"></p>
                            <div class="mt-3">
                                <template x-for="(opt, i) in liveCtrl.activePoll?.options || []" :key="i">
                                    <div class="flex justify-between text-sm mb-2 p-2 rounded-lg" style="background:rgba(255,255,255,0.04);">
                                        <span x-text="opt.text"></span>
                                        <span style="color:var(--accent);" x-text="opt.votes + ' votes'"></span>
                                    </div>
                                </template>
                            </div>
                            <button @click="endPoll()" class="btn-danger mt-3 w-full">End Poll</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar: Chat + Students -->
            <div class="ctrl-sidebar">
                <!-- Tabs -->
                <div class="flex border-b" style="border-color:rgba(255,215,0,0.1);">
                    <button @click="liveCtrl.sideTab = 'chat'" class="flex-1 py-3 text-sm font-bold transition" :style="liveCtrl.sideTab === 'chat' ? 'color:var(--gold);border-bottom:2px solid var(--gold)' : 'color:rgba(255,255,255,0.4)'">💬 Chat</button>
                    <button @click="liveCtrl.sideTab = 'students'" class="flex-1 py-3 text-sm font-bold transition" :style="liveCtrl.sideTab === 'students' ? 'color:var(--gold);border-bottom:2px solid var(--gold)' : 'color:rgba(255,255,255,0.4)'">👥 Students</button>
                    <button @click="liveCtrl.sideTab = 'hands'" class="flex-1 py-3 text-sm font-bold transition relative" :style="liveCtrl.sideTab === 'hands' ? 'color:var(--gold);border-bottom:2px solid var(--gold)' : 'color:rgba(255,255,255,0.4)'">
                        ✋ Hands
                        <span x-show="liveCtrl.raisedHands.length > 0" class="absolute top-2 right-3 w-4 h-4 rounded-full text-[10px] flex items-center justify-center font-bold" style="background:var(--red);color:white;" x-text="liveCtrl.raisedHands.length"></span>
                    </button>
                </div>

                <!-- Chat Tab -->
                <div x-show="liveCtrl.sideTab === 'chat'" class="flex flex-col flex-1 overflow-hidden" style="min-height:0;">
                    <div class="flex-1 overflow-y-auto p-3" id="teacher-chat-messages" style="max-height:calc(100% - 60px);">
                        <template x-for="msg in liveCtrl.messages" :key="msg.id">
                            <div class="chat-msg" :class="msg.role === 'staff' ? 'teacher' : ''">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="text-xs font-black" :style="msg.role === 'staff' ? 'color:var(--gold)' : 'color:var(--accent)'" x-text="msg.name"></span>
                                    <div class="flex gap-1" x-show="msg.role !== 'staff'">
                                        <button @click="muteUser(msg.uid)" class="text-[10px] px-1.5 py-0.5 rounded opacity-60 hover:opacity-100" style="background:rgba(255,215,0,0.1);color:var(--gold);" title="Mute user">🔇</button>
                                        <button @click="kickUser(msg.uid)" class="text-[10px] px-1.5 py-0.5 rounded opacity-60 hover:opacity-100" style="background:rgba(255,58,58,0.1);color:var(--red);" title="Kick user">✕</button>
                                    </div>
                                </div>
                                <p class="text-xs leading-relaxed opacity-90" x-text="msg.message"></p>
                            </div>
                        </template>
                    </div>
                    <div class="p-3 border-t" style="border-color:rgba(255,215,0,0.1);display:flex;gap:8px;">
                        <input type="text" x-model="liveCtrl.chatInput" class="form-input" style="flex:1;padding:8px 12px;font-size:0.8rem;" placeholder="Send a message..." @keydown.enter="teacherSendMessage()">
                        <button @click="teacherSendMessage()" class="ctrl-btn" style="padding:8px 12px;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <!-- Students Tab -->
                <div x-show="liveCtrl.sideTab === 'students'" class="p-3 overflow-y-auto">
                    <p class="text-xs opacity-40 mb-3 font-bold uppercase">Live Students (<span x-text="liveCtrl.studentCount"></span>)</p>
                    <div class="text-sm opacity-40 text-center py-8" x-show="liveCtrl.studentCount === 0">No students joined yet</div>
                    <template x-for="s in liveCtrl.students" :key="s.uid">
                        <div class="student-chip">
                            <span x-text="s.name"></span>
                            <div class="flex gap-1">
                                <button @click="muteUser(s.uid)" class="text-[10px] px-1.5 py-0.5 rounded" style="background:rgba(255,215,0,0.1);color:var(--gold);" title="Mute">🔇</button>
                                <button @click="kickUser(s.uid)" class="text-[10px] px-1.5 py-0.5 rounded" style="background:rgba(255,58,58,0.1);color:var(--red);" title="Kick">✕</button>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Hands Tab -->
                <div x-show="liveCtrl.sideTab === 'hands'" class="p-3 overflow-y-auto">
                    <p class="text-xs opacity-40 mb-3 font-bold uppercase">Raised Hands (<span x-text="liveCtrl.raisedHands.length"></span>)</p>
                    <div class="text-sm opacity-40 text-center py-8" x-show="liveCtrl.raisedHands.length === 0">No hands raised</div>
                    <template x-for="h in liveCtrl.raisedHands" :key="h.uid">
                        <div class="student-chip hand-chip">
                            <span>✋ <span x-text="h.name"></span></span>
                            <button @click="liveCtrl.raisedHands = liveCtrl.raisedHands.filter(x => x.uid !== h.uid)" class="text-xs opacity-60 hover:opacity-100">✓ Ack</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════
         MAIN STAFF DASHBOARD
    ════════════════════════════════════════════════════════ -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex flex-col items-center justify-center text-white p-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 mb-4" style="border-color:var(--gold);border-top-color:transparent;"></div>
            <h2 class="text-xl font-bold">Verifying Staff Access...</h2>
            <p class="opacity-50 mt-2 text-sm">If not redirected, <a href="index.html" class="underline" style="color:var(--accent);">login here</a>.</p>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="flex min-h-screen">
            <!-- Sidebar -->
            <aside class="w-64 hidden md:flex flex-col" style="background:var(--deep2);border-right:1px solid rgba(255,215,0,0.15);">
                <div class="p-6">
                    <h2 class="text-xl font-black" style="background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Arrow of Mathematics</h2>
                    <p class="text-xs opacity-40 mt-1 font-bold uppercase tracking-widest">Staff Portal</p>
                </div>
                <nav class="flex-1 px-4 space-y-1">
                    <!-- LIVE CLASS (top priority) -->
                    <button @click="activeTab = 'live'" :style="activeTab === 'live' ? 'background:linear-gradient(135deg,var(--red),#ff6b35);color:white;' : 'background:rgba(255,58,58,0.07);color:rgba(255,255,255,0.7);border:1px solid rgba(255,58,58,0.2);'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-broadcast-tower w-5 mr-2"></i> Live Classes
                    </button>
                    <button @click="activeTab = 'batches'" :style="activeTab === 'batches' ? 'background:linear-gradient(135deg,var(--gold),var(--accent));color:var(--deep)' : 'color:rgba(255,255,255,0.7)'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-layer-group w-5 mr-2"></i> Batch Management
                    </button>
                    <button @click="activeTab = 'admissions'" :style="activeTab === 'admissions' ? 'background:linear-gradient(135deg,var(--gold),var(--accent));color:var(--deep)' : 'color:rgba(255,255,255,0.7)'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-user-graduate w-5 mr-2"></i> Admissions
                    </button>
                    <button @click="activeTab = 'news'" :style="activeTab === 'news' ? 'background:linear-gradient(135deg,var(--gold),var(--accent));color:var(--deep)' : 'color:rgba(255,255,255,0.7)'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-newspaper w-5 mr-2"></i> Post News
                    </button>
                    <button @click="activeTab = 'docs'" :style="activeTab === 'docs' ? 'background:linear-gradient(135deg,var(--gold),var(--accent));color:var(--deep)' : 'color:rgba(255,255,255,0.7)'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-folder-open w-5 mr-2"></i> Resources
                    </button>
                    <button @click="activeTab = 'scores'" :style="activeTab === 'scores' ? 'background:linear-gradient(135deg,var(--gold),var(--accent));color:var(--deep)' : 'color:rgba(255,255,255,0.7)'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-chart-bar w-5 mr-2"></i> Test Scores
                    </button>
                    <button @click="activeTab = 'analytics'" :style="activeTab === 'analytics' ? 'background:linear-gradient(135deg,var(--gold),var(--accent));color:var(--deep)' : 'color:rgba(255,255,255,0.7)'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-chart-pie w-5 mr-2"></i> Analytics
                    </button>
                    <button @click="activeTab = 'manage-staff'" :style="activeTab === 'manage-staff' ? 'background:linear-gradient(135deg,var(--gold),var(--accent));color:var(--deep)' : 'color:rgba(255,255,255,0.7)'" class="w-full flex items-center px-4 py-3 rounded-xl font-bold transition-all text-sm">
                        <i class="fas fa-users-cog w-5 mr-2"></i> Manage Staff
                    </button>
                </nav>
                <div class="p-4">
                    <button @click="logout" class="flex items-center gap-2 text-sm font-bold transition opacity-60 hover:opacity-100" style="color:var(--red);"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-6" style="max-height:100vh;">
                <header class="flex justify-between items-center mb-8 p-4 rounded-2xl card-staff">
                    <h1 class="text-xl font-black" x-text="tabTitle()"></h1>
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full" :style="wsConnected ? 'background:var(--green)' : 'background:rgba(255,255,255,0.2)'"></div>
                        <span class="text-xs font-bold" :style="wsConnected ? 'color:var(--green)' : 'color:rgba(255,255,255,0.4)'" x-text="wsConnected ? 'Live Connected' : 'Offline'"></span>
                        <button @click="exportData" class="ctrl-btn success"><i class="fas fa-download mr-1"></i> Export</button>
                    </div>
                </header>

                <!-- ── LIVE CLASSES TAB ── -->
                <div x-show="activeTab === 'live'" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="p-4 rounded-2xl card-staff text-center"><div class="text-3xl font-black" style="color:var(--gold);" x-text="admissions.length"></div><div class="text-xs opacity-40 uppercase font-bold mt-1">Total Students</div></div>
                        <div class="p-4 rounded-2xl card-staff text-center"><div class="text-3xl font-black" style="color:var(--green);" x-text="liveCtrl.sessionId ? '1' : '0'"></div><div class="text-xs opacity-40 uppercase font-bold mt-1">Live Right Now</div></div>
                        <div class="p-4 rounded-2xl card-staff text-center"><div class="text-3xl font-black" style="color:var(--accent);" x-text="batches.length"></div><div class="text-xs opacity-40 uppercase font-bold mt-1">Active Batches</div></div>
                    </div>

                    <!-- Start Live Class -->
                    <div class="p-6 rounded-2xl card-staff" style="border-color:rgba(255,58,58,0.3);">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script>
    // Extend staffPortal() with live class features
    document.addEventListener('alpine:init', () => {
        Alpine.data('staffPortalLiveExtension', () => ({})); // placeholder
    });
    </script>
    <script>
    // Inject live class support into window after script.js loads
    window.addEventListener('load', () => {
        if (typeof Alpine !== 'undefined' && window._staffPortalComponent) {
            const comp = window._staffPortalComponent;

            // ── Live Class WebSocket Setup ──
            comp.wsConnected = false;
            comp.liveCtrl = {
                active: false, sessionId: null, batchName: '', batchId: '',
                streamKey: '', studentCount: 0, chatMuted: false,
                messages: [], chatInput: '', sideTab: 'chat',
                students: [], raisedHands: [], activePoll: null, duration: '',
            };
            comp.liveForm = { batchId: '', batchName: '', streamKey: '' };
            comp.scheduleForm = { batchId: '', scheduledAt: '', duration: 60 };
            comp.pollForm = { question: '', options: ['', '', '', ''] };
            comp.batches = [
                { id:'b1', name:'Maths Foundation', grade:'Class 10', teacher:'Dr. Abhay Sharma', schedule:'Mon,Wed,Fri 4PM', studentCount: 24 },
                { id:'b2', name:'Board Preparation 2026', grade:'Class 10', teacher:'Ms. Priya Singh', schedule:'Tue,Thu 5PM', studentCount: 18 },
                { id:'b3', name:'PCM Full Course', grade:'Class 12', teacher:'Mr. Rajesh Kumar', schedule:'Sat,Sun 10AM', studentCount: 31 },
                { id:'b4', name:'JEE Foundation', grade:'Class 12', teacher:'Ms. Neha Verma', schedule:'Daily 6PM', studentCount: 42 },
                { id:'b5', name:'Doubt Solving Batch', grade:'Class 10', teacher:'Dr. Abhay Sharma', schedule:'Fri 7PM', studentCount: 15 },
            ];

            comp.initLiveWebSocket = async function() {
                try {
                    const tr = await fetch('/api/live-token');
                    const { token } = await tr.json();
                    LiveClass.connect({ token, role: 'staff', user: { name: this.staffName || 'Teacher' } });
                    LiveClass.on('connected', () => { this.wsConnected = true; });
                    LiveClass.on('disconnected', () => { this.wsConnected = false; });
                    LiveClass.on('teacher:session_started', (data) => {
                        this.liveCtrl.sessionId = data.sessionId;
                        this.liveCtrl.active = true;
                        this.startDurationTimer();
                        document.body.style.overflow = 'hidden';
                    });
                    LiveClass.on('session:student_count', ({ count, newStudent }) => {
                        this.liveCtrl.studentCount = count;
                        if (newStudent) {
                            const already = this.liveCtrl.students.find(s => s.uid === newStudent.uid);
                            if (!already) this.liveCtrl.students.push(newStudent);
                        }
                    });
                    LiveClass.on('chat:message', (msg) => {
                        this.liveCtrl.messages.push(msg);
                        if (this.liveCtrl.messages.length > 200) this.liveCtrl.messages.shift();
                        this.$nextTick(() => { const el = document.getElementById('teacher-chat-messages'); if(el) el.scrollTop = el.scrollHeight; });
                    });
                    LiveClass.on('hand:raised', (data) => {
                        const already = this.liveCtrl.raisedHands.find(h => h.uid === data.uid);
                        if (!already) this.liveCtrl.raisedHands.push(data);
                    });
                    LiveClass.on('hand:lowered', ({ uid }) => {
                        this.liveCtrl.raisedHands = this.liveCtrl.raisedHands.filter(h => h.uid !== uid);
                    });
                    LiveClass.on('poll:update', ({ options }) => {
                        if (this.liveCtrl.activePoll) this.liveCtrl.activePoll.options = options;
                    });
                } catch(e) { console.warn('LiveClass WS init failed'); }
            };

            comp.startLiveClass = function() {
                if (!this.liveForm.batchId) { alert('Please select a batch'); return; }
                const batch = this.batches.find(b => b.id === this.liveForm.batchId);
                this.liveCtrl.batchName = batch?.name || this.liveForm.batchId;
                this.liveCtrl.batchId = this.liveForm.batchId;
                this.liveCtrl.streamKey = this.liveForm.streamKey || 'sk_' + Math.random().toString(36).slice(2,12);
                LiveClass.startSession({ batchId: this.liveForm.batchId, batchName: this.liveCtrl.batchName, streamKey: this.liveCtrl.streamKey });
            };

            comp.stopLiveClass = function() {
                if (!confirm('End the live class?')) return;
                LiveClass.stopSession();
                this.liveCtrl.active = false;
                this.liveCtrl.sessionId = null;
                this.liveCtrl.students = [];
                this.liveCtrl.raisedHands = [];
                this.liveCtrl.messages = [];
                clearInterval(this._durationInterval);
                document.body.style.overflow = '';
            };

            comp.toggleChatMute = function() {
                this.liveCtrl.chatMuted = !this.liveCtrl.chatMuted;
                LiveClass.muteChat(this.liveCtrl.chatMuted);
            };

            comp.muteUser = function(uid) { LiveClass.muteUser(uid); };
            comp.kickUser = function(uid) {
                LiveClass.kickUser(uid);
                this.liveCtrl.students = this.liveCtrl.students.filter(s => s.uid !== uid);
            };

            comp.teacherSendMessage = function() {
                const msg = this.liveCtrl.chatInput.trim();
                if (!msg) return;
                LiveClass.sendMessage(msg);
                this.liveCtrl.chatInput = '';
            };

            comp.launchPoll = function() {
                const opts = this.pollForm.options.filter(o => o.trim());
                if (!this.pollForm.question.trim() || opts.length < 2) { alert('Add question and at least 2 options'); return; }
                LiveClass.createPoll(this.pollForm.question, opts);
                this.liveCtrl.activePoll = { question: this.pollForm.question, options: opts.map(o => ({text:o, votes:0})), active:true };
                this.pollForm = { question:'', options:['','','',''] };
            };

            comp.endPoll = function() { LiveClass.endPoll(); this.liveCtrl.activePoll = null; };

            comp.shareLiveResource = function() {
                const title = prompt('Resource title:');
                const url = prompt('Resource URL:');
                if (title && url) LiveClass.shareResource(title, url);
            };

            comp.scheduleClass = async function() {
                if (!this.scheduleForm.batchId || !this.scheduleForm.scheduledAt) { alert('Fill all fields'); return; }
                const batch = this.batches.find(b => b.id === this.scheduleForm.batchId);
                try {
                    await window.db.collection('liveSchedule').add({
                        batchId: this.scheduleForm.batchId,
                        batchName: batch?.name || '',
                        teacherName: this.staffName || 'Teacher',
                        scheduledAt: new Date(this.scheduleForm.scheduledAt),
                        duration: this.scheduleForm.duration,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });
                    alert('Class scheduled!');
                    this.scheduleForm = { batchId:'', scheduledAt:'', duration:60 };
                } catch(e) { alert('Error: ' + e.message); }
            };

            comp.createBatch = async function() {
                if (!this.batchForm.name || !this.batchForm.grade) { alert('Fill required fields'); return; }
                const newBatch = { id:'b_'+Date.now(), ...this.batchForm, studentCount:0 };
                this.batches.push(newBatch);
                // Also save to Firebase if needed
                this.batchForm = { name:'', grade:'', teacher:'', schedule:'' };
                alert('Batch created!');
            };

            comp.deleteBatch = function(id) { if(confirm('Delete batch?')) this.batches = this.batches.filter(b => b.id !== id); };

            comp.startDurationTimer = function() {
                const start = Date.now();
                this._durationInterval = setInterval(() => {
                    const s = Math.floor((Date.now()-start)/1000);
                    const m = Math.floor(s/60);
                    this.liveCtrl.duration = `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
                }, 1000);
            };

            comp.batchForm = { name:'', grade:'', teacher:'', schedule:'' };

            // Analytics computed
            Object.defineProperty(comp, 'scoreRanges', { get() {
                const all = this.allScores || [];
                return [
                    { label:'90-100% (Excellent)', count:all.filter(s=>s.percentage>=90).length, color:'var(--green)' },
                    { label:'75-89% (Good)', count:all.filter(s=>s.percentage>=75&&s.percentage<90).length, color:'var(--gold)' },
                    { label:'60-74% (Average)', count:all.filter(s=>s.percentage>=60&&s.percentage<75).length, color:'var(--accent)' },
                    { label:'Below 60% (Needs Help)', count:all.filter(s=>s.percentage<60).length, color:'var(--red)' },
                ];
            }});

            // Init WebSocket
            comp.initLiveWebSocket();
        }
    });
    </script>
    <script>
        // Cursor + Particles
        const cursor = document.getElementById('cursor');
        const dot = document.getElementById('cursorDot');
        let cx=0,cy=0,dx=0,dy=0;
        document.addEventListener('mousemove', e => { dx=e.clientX; dy=e.clientY; dot.style.left=dx-3+'px'; dot.style.top=dy-3+'px'; });
        (function anim(){ cx+=(dx-cx)*0.12; cy+=(dy-cy)*0.12; cursor.style.left=cx-9+'px'; cursor.style.top=cy-9+'px'; requestAnimationFrame(anim); })();
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const pts = Array.from({length:60},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,alpha:Math.random()*.3+.1,color:Math.random()>.6?'255,215,0':Math.random()>.5?'0,245,255':'255,255,255'}));
        (function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{ p.x+=p.dx; p.y+=p.dy; if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0; ctx.fillStyle=`rgba(${p.color},${p.alpha})`; ctx.fillRect(p.x,p.y,p.r,p.r); }); requestAnimationFrame(draw); })();
        window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
    </script>

    <script src="firstVisitorCelebration.js"></script>
    <script src="gamification.js"></script>
    <script src="effects-3d-enhanced.js" defer></script>
    <script src="features-new.js" defer></script>
