<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Classroom | Era of MathAntics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #video-container iframe { border-radius: 0.5rem; }
        .chat-gradient { background: linear-gradient(to bottom, #1f2937, #111827); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="h-full text-white flex flex-col overflow-hidden">
    <!-- Top Navigation -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <a href="/student.html" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-left"></i></a>
            <h1 id="batch-name" class="font-bold text-lg tracking-tight">Loading Live Class...</h1>
            <span class="bg-red-600 text-[10px] uppercase font-bold px-2 py-0.5 rounded animate-pulse">Live</span>
        </div>
        <div class="flex items-center space-x-6 text-sm">
            <span id="user-display" class="text-gray-400"></span>
            <button onclick="window.location.href='/student.html'" class="bg-blue-600 hover:bg-blue-700 px-4 py-1.5 rounded-lg transition">Back to Portal</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Video Area -->
        <div class="flex-1 bg-black relative flex flex-col">
            <div id="video-placeholder" class="absolute inset-0 flex items-center justify-center text-gray-600">
                <div class="text-center">
                    <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                    <p>Connecting to secure stream...</p>
                </div>
            </div>
            <div id="jitsi-container" class="w-full h-full z-10"></div>
        </div>

        <!-- Professional Sidebar -->
        <aside class="w-80 chat-gradient border-l border-gray-800 flex flex-col">
            <div class="p-4 border-b border-gray-800 flex space-x-4">
                <button class="text-blue-400 border-b-2 border-blue-400 pb-2 text-sm font-semibold flex-1">Chat</button>
                <button class="text-gray-500 pb-2 text-sm font-semibold flex-1 hover:text-gray-300">Resources</button>
            </div>

            <!-- Live Chat Messages -->
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                <!-- Messages injected here -->
            </div>

            <!-- Chat Input -->
            <div class="p-4 bg-gray-800">
                <form id="chat-form" class="flex items-center space-x-2">
                    <input type="text" id="chat-input" placeholder="Ask a question..." 
                        class="flex-1 bg-gray-900 border border-gray-700 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                    <button type="submit" class="bg-blue-600 p-2 rounded-full hover:bg-blue-700 transition">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </aside>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDkrbfNKopAWj7ZA5fCrkjsOz_dsdMCmCs",
            authDomain: "era-of-mathantics-8b6d1.firebaseapp.com",
            projectId: "era-of-mathantics-8b6d1",
            storageBucket: "era-of-mathantics-8b6d1.firebasestorage.app",
            messagingSenderId: "521238168559",
            appId: "1:521238168559:web:83b3c06de5b28b1eac6c1a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        const urlParams = new URLSearchParams(window.location.search);
        const batchId = urlParams.get('batch') || 'general_class';

        async function init() {
            const res = await fetch('/api/check-auth');
            const data = await res.json();
            if (!data.authenticated) {
                window.location.href = '/index.html';
                return;
            }
            currentUser = data;
            document.getElementById('user-display').innerText = `Student: ${data.name || data.email.split('@')[0]}`;

            const batchDoc = await db.collection('batches').doc(batchId).get();
            const batchData = batchDoc.data();
            document.getElementById('batch-name').innerText = `Live Class: ${batchData ? batchData.name : 'Mathematics'}`;

            startLiveStream();
            initChat();
        }

        function startLiveStream() {
            const domain = 'meet.jit.si';
            const options = {
                roomName: `EraOfMathAntics_Live_${batchId}`,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: {
                    startWithAudioMuted: true,
                    disableModeratorIndicator: true,
                    startScreenSharing: false,
                    enableWelcomePage: false,
                    prejoinPageEnabled: false
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'fullscreen', 'hangup', 'chat', 'raisehand', 'tileview'],
                    MOBILE_APP_PROMO: false
                },
                userInfo: { email: currentUser.email, displayName: currentUser.email.split('@')[0] }
            };
            const api = new JitsiMeetExternalAPI(domain, options);
            document.getElementById('video-placeholder').style.display = 'none';
        }

        function initChat() {
            const chatBox = document.getElementById('chat-box');
            const chatForm = document.getElementById('chat-form');
            const chatInput = document.getElementById('chat-input');

            // Listen for messages
            db.collection('live_chats').doc(batchId).collection('messages')
                .orderBy('timestamp', 'asc')
                .limitToLast(50)
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const msg = change.doc.data();
                            const div = document.createElement('div');
                            const isMe = msg.email === currentUser.email;
                            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                            div.innerHTML = `
                                <span class="text-[10px] text-gray-500 mb-1">${msg.email ? msg.email.split('@')[0] : 'User'}</span>
                                <div class="px-3 py-2 rounded-2xl text-xs ${isMe ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-200'}">
                                    ${msg.text}
                                </div>
                            `;
                            chatBox.appendChild(div);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    });
                });

            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const text = chatInput.value.trim();
                if (!text) return;

                chatInput.value = '';
                await db.collection('live_chats').doc(batchId).collection('messages').add({
                    text: text,
                    email: currentUser.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
        }

        init();
    </script>
</body>
</html>
