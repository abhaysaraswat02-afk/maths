<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Hub | Era of MathAntics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .sidebar-item.active { background: #1e40af; color: white; border-radius: 12px; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* Add animations for dashboard */
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans" x-data="staffPortal()" x-init="init()">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r p-6 hidden md:block">
            <div class="flex items-center space-x-3 mb-10">
                <div class="w-8 h-8 bg-blue-600 rounded-lg"></div>
                <span class="font-bold text-xl tracking-tight">StaffPanel</span>
            </div>

            <nav class="space-y-2">
                <button @click="activeTab = 'dashboard'" :class="{'active': activeTab === 'dashboard'}" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 text-slate-600 hover:bg-slate-50 transition">
                    <i class="fas fa-th-large w-5"></i> <span class="font-medium">Dashboard</span>
                </button>
                <button @click="activeTab = 'admissions'" :class="{'active': activeTab === 'admissions'}" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 text-slate-600 hover:bg-slate-50 transition">
                    <i class="fas fa-chart-line w-5"></i> <span class="font-medium">Analytics</span>
                </button>
                <button @click="activeTab = 'batches'" :class="{'active': activeTab === 'batches'}" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 text-slate-600 hover:bg-slate-50 transition">
                    <i class="fas fa-users w-5"></i> <span class="font-medium">Batches</span>
                </button>
                <button @click="activeTab = 'live'" :class="{'active': activeTab === 'live'}" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 text-slate-600 hover:bg-slate-50 transition">
                    <i class="fas fa-video w-5"></i> <span class="font-medium">Live Class</span>
                </button>
                <button @click="activeTab = 'resources'" :class="{'active': activeTab === 'resources'}" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 text-slate-600 hover:bg-slate-50 transition">
                    <i class="fas fa-file-upload w-5"></i> <span class="font-medium">Upload Resources</span>
                </button>
                <button @click="activeTab = 'notifications'" :class="{'active': activeTab === 'notifications'}" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 text-slate-600 hover:bg-slate-50 transition">
                    <i class="fas fa-bell w-5"></i> <span class="font-medium">Notifications</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-10 overflow-y-auto">
            
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-2xl font-black capitalize" x-text="activeTab === 'admissions' ? 'Student Analytics' : activeTab"></h1>
                <div class="flex items-center space-x-4">
                    <span class="text-sm font-bold text-slate-400" x-text="todayDate"></span>
                    <button @click="logout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition">Logout</button>
                </div>
            </header>

            <div x-show="activeTab === 'dashboard'" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <p class="text-slate-400 text-xs font-bold uppercase">Total Students</p>
                        <h2 class="text-3xl font-black mt-2" x-text="admissionList.length">0</h2>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <p class="text-slate-400 text-xs font-bold uppercase">Active Batches</p>
                        <h2 class="text-3xl font-black mt-2" x-text="batches.length">0</h2>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <p class="text-slate-400 text-xs font-bold uppercase">Resources Shared</p>
                        <h2 class="text-3xl font-black mt-2" x-text="resources.length">0</h2>
                    </div>
                </div>
            </div>

            <!-- BATCHES & RESOURCES -->
            <div x-show="activeTab === 'batches'" x-cloak>
                <div class="bg-white p-6 rounded-3xl border mb-8">
                    <h3 class="font-bold mb-4">Create New Batch</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <input type="text" x-model="newBatch.name" placeholder="Batch Name (e.g. Class 10 Math)" class="bg-slate-50 border-none rounded-xl p-3">
                        <input type="text" x-model="newBatch.timing" placeholder="Timing (e.g. 4 PM - 5 PM)" class="bg-slate-50 border-none rounded-xl p-3">
                        <input type="number" x-model="newBatch.fee" placeholder="Fee (₹)" class="bg-slate-50 border-none rounded-xl p-3">
                        <textarea x-model="newBatch.description" placeholder="Batch Description..." class="md:col-span-2 bg-slate-50 border-none rounded-xl p-3" rows="2"></textarea>
                    </div>
                    <div class="flex justify-end">
                        <button @click="addBatch()" class="bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">Add Batch</button>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <template x-for="batch in batches" :key="batch.id">
                        <div class="bg-white p-6 rounded-2xl border flex justify-between items-center shadow-sm">
                            <div>
                                <h4 class="font-bold text-lg" x-text="batch.name"></h4>
                                <p class="text-slate-500 text-sm" x-text="(batch.timing || 'Flexible') + ' • ₹' + (batch.fee || 0)"></p>
                            </div>
                            <button @click="deleteItem('batches', batch.id)" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </div>
                    </template>
                </div>
            </div>

            <!-- LIVE CLASS (New) -->
            <div x-show="activeTab === 'live'" x-cloak>
                <div class="bg-white p-8 rounded-3xl border max-w-2xl mx-auto shadow-xl">
                    <h2 class="text-xl font-bold mb-6 text-red-600"><i class="fas fa-broadcast-tower mr-2"></i> Go Live</h2>
                    <p class="text-slate-500 mb-6 text-sm">Start a live session for your batches. Students will see a "Join Live" button on their dashboard.</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Meeting URL</label>
                            <input type="url" x-model="newLiveClass.url" placeholder="https://meet.google.com/..." class="w-full bg-slate-50 border-none rounded-xl p-4">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Scheduled Time</label>
                            <input type="datetime-local" x-model="newLiveClass.time" class="w-full bg-slate-50 border-none rounded-xl p-4 font-bold text-slate-600">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Select Batch to Notify</label>
                            <select x-model="newLiveClass.batchId" class="w-full bg-slate-50 border-none rounded-xl p-4">
                                <option>All Students</option>
                                <template x-for="batch in batches"><option :value="batch.id" x-text="batch.name"></option></template>
                            </select>
                        </div>
                        <button @click="scheduleLiveClass()" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl hover:bg-red-700 transition animate-pulse">
                            Start Session & Notify
                        </button>
                    </div>
                </div>
            </div>

            <!-- UPLOAD RESOURCES (New) -->
            <div x-show="activeTab === 'resources'" x-cloak>
                <div class="bg-white p-8 rounded-3xl border max-w-2xl mx-auto shadow-xl">
                    <h2 class="text-xl font-bold mb-6 text-green-600"><i class="fas fa-file-upload mr-2"></i> Upload Resources</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Resource Title</label>
                            <input type="text" x-model="newResource.title" placeholder="e.g. Algebra Worksheet #1" class="w-full bg-slate-50 border-none rounded-xl p-4 font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Assign to Batch</label>
                            <select x-model="newResource.batchId" class="w-full bg-slate-50 border-none rounded-xl p-4 font-bold">
                                <option value="">Select a batch...</option>
                                <template x-for="batch in batches"><option :value="batch.id" x-text="batch.name"></option></template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Resource Type</label>
                            <select x-model="newResource.type" class="w-full bg-slate-50 border-none rounded-xl p-4 font-bold">
                                <option value="pdf">PDF Document</option>
                                <option value="video">Recorded Video Link</option>
                            </select>
                        </div>
                        <div x-show="newResource.type === 'video'">
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Video URL</label>
                            <input type="url" x-model="newResource.link" placeholder="https://youtube.com/watch?v=..." class="w-full bg-slate-50 border-none rounded-xl p-4 font-bold">
                        </div>
                        <button @click="uploadResource()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition">
                            <span x-show="newResource.type === 'pdf'">Upload PDF</span>
                            <span x-show="newResource.type !== 'pdf'">Save Resource</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- NOTIFICATIONS (New) -->
            <div x-show="activeTab === 'notifications'" x-cloak>
                <div class="bg-white p-8 rounded-3xl border max-w-2xl mx-auto shadow-sm">
                    <h2 class="text-xl font-bold mb-6 text-purple-600"><i class="fas fa-paper-plane mr-2"></i> Push Notification</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Notification Title</label>
                            <input type="text" x-model="notification.title" placeholder="e.g. New Assignment Uploaded!" class="w-full bg-slate-50 border-none rounded-xl p-4 font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Message Body</label>
                            <textarea x-model="notification.body" rows="4" placeholder="Enter your message here..." class="w-full bg-slate-50 border-none rounded-xl p-4 font-medium"></textarea>
                        </div>
                        <button @click="sendNotification()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700 transition">
                            Send Broadcast
                        </button>
                    </div>
                </div>
            </div>

            <!-- ANALYTICS (Refined Admissions Tab) -->
            <div x-show="activeTab === 'admissions'" x-cloak>
               <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                   <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                       <div>
                           <h3 class="font-bold text-lg">Student Management</h3>
                           <input type="text" x-model="searchQuery" placeholder="Search by name or phone..." class="mt-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm">
                       </div>
                       <button class="text-blue-600 font-bold text-xs uppercase">Export CSV</button>
                   </div>
                   <table class="w-full text-left">
                       <thead class="bg-white border-b">
                           <tr>
                               <th class="p-4 text-xs font-bold uppercase text-slate-400">Student Name</th>
                               <th class="p-4 text-xs font-bold uppercase text-slate-400">Status</th>
                               <th class="p-4 text-xs font-bold uppercase text-slate-400">Progress</th>
                               <th class="p-4 text-xs font-bold uppercase text-slate-400">Actions</th>
                           </tr>
                       </thead>
                       <tbody>
                           <template x-for="student in filteredAdmissions" :key="student.id">
                               <tr class="border-b hover:bg-slate-50 transition">
                                   <td class="p-4">
                                       <p class="font-bold" x-text="student.name"></p>
                                       <p class="text-xs text-slate-400" x-text="student.phone"></p>
                                   </td>
                                   <td class="p-4">
                                       <span class="px-3 py-1 rounded-full text-xs font-bold uppercase" 
                                             :class="student.status === 'Confirmed' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'"
                                             x-text="student.status"></span>
                                   </td>
                                   <td class="p-4 w-1/3">
                                       <div class="w-full bg-slate-200 rounded-full h-2">
                                           <div class="bg-blue-600 h-2 rounded-full" style="width: 65%"></div>
                                       </div>
                                       <p class="text-[10px] text-right mt-1 font-bold text-slate-400">65% Avg.</p>
                                   </td>
                                   <td class="p-4">
                                       <button @click="toggleStatus(student)" class="text-xs font-bold uppercase px-2 py-1 rounded mr-2 transition" 
                                            :class="student.status === 'Confirmed' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'">
                                            <i class="fas" :class="student.status === 'Confirmed' ? 'fa-times' : 'fa-check'"></i>
                                       </button>
                                       <button @click="deleteItem('admissions', student.id)" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                                   </td>
                               </tr>
                           </template>
                       </tbody>
                   </table>
               </div>
            </div>

        </main>
    </div>

    <script>
        // Use your existing Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCGWDBlk10C4g43PDj5WRXqhYxn4_649VQ",
            authDomain: "era-of-mathantics-8b6d1.firebaseapp.com",
            projectId: "era-of-mathantics-8b6d1",
            storageBucket: "era-of-mathantics-8b6d1.firebasestorage.app",
            messagingSenderId: "521238168559",
            appId: "1:521238168559:web:83b3c06de5b28b1eac6c1a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function staffPortal() {
            return {
                activeTab: 'dashboard',
                todayDate: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
                admissionList: [],
                batches: [],
                resources: [],
                newBatch: { name: '', timing: '', fee: '', description: '' },
                newResource: { title: '', batchId: '', link: '', type: 'pdf' },
                notification: { title: '', body: '' },
                newLiveClass: { url: '', time: '', batchId: '' },
                searchQuery: '',

                get filteredAdmissions() {
                    if (!this.searchQuery) {
                        return this.admissionList;
                    }
                    return this.admissionList.filter(student => student.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || student.phone.includes(this.searchQuery));
                },

                init() {
                    this.fetchData('admissions', 'admissionList');
                    this.fetchData('batches', 'batches');
                    this.fetchData('resources', 'resources');
                },

                fetchData(collection, target) {
                    db.collection(collection).onSnapshot(snap => {
                        this[target] = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    });
                },

                addBatch() {
                    if (!this.newBatch.name || !this.newBatch.fee) return alert('Batch name and fee are required');
                    db.collection('batches').add(this.newBatch).then(() => {
                        this.newBatch = { name: '', timing: '', fee: '', description: '' };
                    });
                },

                async uploadResource() {
                    if (!this.newResource.title || !this.newResource.batchId) {
                        return alert('Title and Batch are required.');
                    }

                    if (this.newResource.type === 'pdf') {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'application/pdf';
                        input.onchange = async (e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            const storageRef = firebase.storage().ref(`resources/${Date.now()}_${file.name}`);
                            try {
                                alert('Uploading PDF... Please wait.');
                                const snapshot = await storageRef.put(file);
                                const url = await snapshot.ref.getDownloadURL();
                                this.newResource.link = url;
                                this.saveResourceToDb();
                            } catch (err) {
                                console.error(err);
                                alert('Upload failed.');
                            }
                        };
                        input.click();
                    } else {
                        if (!this.newResource.link) return alert('Video URL is required.');
                        this.saveResourceToDb();
                    }
                },

                saveResourceToDb() {
                    db.collection('resources').add({
                        ...this.newResource,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        alert('Resource saved successfully!');
                        this.newResource = { title: '', batchId: '', link: '', type: 'pdf' };
                    });
                },

                scheduleLiveClass() {
                    if (!this.newLiveClass.url || !this.newLiveClass.time || !this.newLiveClass.batchId) {
                        return alert('All fields are required to schedule a live class.');
                    }
                    db.collection('live_classes').add(this.newLiveClass).then(() => {
                        alert('Live class scheduled!');
                        this.newLiveClass = { url: '', time: '', batchId: '' };
                    });
                },

                deleteItem(collection, id) {
                    if (confirm('Are you sure?')) {
                        db.collection(collection).doc(id).delete();
                    }
                },

                toggleStatus(student) {
                    const newStatus = student.status === 'Confirmed' ? 'Pending' : 'Confirmed';
                    db.collection('admissions').doc(student.id).update({ status: newStatus });
                },

                sendNotification() {
                    if(!this.notification.title || !this.notification.body) return alert("Fill all fields");
                    // Simulating sending to a Cloud Function
                    alert(`Notification Queued:\nTitle: ${this.notification.title}\nTo: All Students`);
                    db.collection('notifications').add({
                        ...this.notification,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => { this.notification = { title: '', body: '' };
                    });
                },

                logout() {
                    window.location.href = 'index.html';
                }
            }
        }
    </script>
</body>
</html>
