<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teaching Studio | Era of MathAntics</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        :root {
            --bg:#0b0d12;--surface:#111420;--surface2:#181c28;--surface3:#1e2235;
            --border:rgba(255,255,255,0.07);--blue:#3b82f6;--blue2:#1d4ed8;
            --gold:#f59e0b;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
        h1,h2,h3,h4{font-family:'Syne',sans-serif}

        /* BATCH OVERLAY */
        .overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:24px}
        .overlay-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px;max-width:460px;width:100%;box-shadow:0 40px 100px rgba(0,0,0,0.5)}
        .overlay-box h2{font-size:1.4rem;margin-bottom:6px}
        .overlay-box p{color:var(--muted);font-size:0.85rem;margin-bottom:24px}

        /* BATCH LIST */
        .batch-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;border:2px solid var(--border);cursor:pointer;transition:all 0.2s;margin-bottom:8px}
        .batch-item:hover{border-color:var(--blue);background:rgba(59,130,246,0.05)}
        .batch-item.selected{border-color:var(--blue);background:rgba(59,130,246,0.1)}
        .batch-icon{width:40px;height:40px;border-radius:12px;background:var(--blue2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;flex-shrink:0}
        .launch-btn{width:100%;padding:16px;border-radius:14px;border:none;background:var(--blue);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:background 0.2s;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:10px}
        .launch-btn:hover{background:var(--blue2)}
        .launch-btn:disabled{background:var(--surface3);color:var(--muted);cursor:not-allowed}

        /* HEADER */
        .header{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
        .header-left{display:flex;align-items:center;gap:14px}
        .live-badge{background:var(--red);color:#fff;font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.12em;padding:3px 10px;border-radius:100px;animation:pulse 1.5s infinite;display:flex;align-items:center;gap:5px}
        .live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
        .timer{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;color:var(--green);background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);padding:5px 12px;border-radius:8px}
        .viewer-pill{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--muted)}

        /* MAIN */
        .main{flex:1;display:flex;overflow:hidden;gap:0}

        /* VIDEO */
        .video-col{flex:1;display:flex;flex-direction:column;background:#000;position:relative}
        #jitsi-container{flex:1;width:100%}

        /* TOOLBAR */
        .toolbar{background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .tool-group{display:flex;gap:8px;align-items:center}
        .tool-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s}
        .tool-btn:hover{border-color:var(--blue);color:var(--blue)}
        .tool-btn.danger{border-color:rgba(239,68,68,0.3);color:var(--red)}
        .tool-btn.danger:hover{background:rgba(239,68,68,0.1)}
        .tool-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
        .tool-btn.primary:hover{background:var(--blue2)}

        /* SIDEBAR */
        .sidebar{width:360px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
        .stab{flex:1;padding:11px 6px;font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent}
        .stab.active{color:var(--blue);border-bottom-color:var(--blue)}
        .tab-content{display:none;flex:1;overflow:hidden;flex-direction:column}
        .tab-content.active{display:flex}

        /* CHAT */
        .chat-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
        .chat-area::-webkit-scrollbar{width:3px}
        .chat-area::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
        .msg{display:flex;gap:8px;animation:fadeUp 0.25s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.7rem}
        .msg-body{flex:1}
        .msg-name{font-size:0.7rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px}
        .msg-text{font-size:0.82rem;color:var(--text);background:var(--surface2);padding:8px 12px;border-radius:0 12px 12px 12px;line-height:1.4;word-break:break-word}
        .msg.hand .msg-text{border:1px solid rgba(245,158,11,0.4);background:rgba(245,158,11,0.05)}
        .hand-alert{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:10px 14px;font-size:0.8rem;color:var(--gold);display:flex;align-items:center;justify-content:space-between;gap:8px}
        .hand-dismiss{font-size:0.7rem;background:rgba(245,158,11,0.2);border:none;color:var(--gold);padding:4px 10px;border-radius:6px;cursor:pointer}

        /* ANNOUNCE */
        .chat-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
        .announce-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:0.82rem;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s}
        .announce-input:focus{border-color:var(--blue)}
        .announce-row{display:flex;gap:8px;margin-top:8px}
        .send-btn{flex:1;padding:9px;border-radius:10px;background:var(--blue);border:none;color:#fff;font-weight:700;font-size:0.82rem;cursor:pointer;transition:background 0.2s}
        .send-btn:hover{background:var(--blue2)}
        .pin-btn{padding:9px 14px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--gold);font-size:0.82rem;cursor:pointer;transition:all 0.2s}
        .pin-btn:hover{border-color:var(--gold)}

        /* STUDENTS */
        .student-panel{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:6px}
        .student-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
        .s-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;flex-shrink:0}
        .s-info{flex:1}
        .s-name{font-size:0.82rem;font-weight:600}
        .s-email{font-size:0.7rem;color:var(--muted)}
        .s-hand{color:var(--gold)}
        .online-badge{width:8px;height:8px;border-radius:50%;background:var(--green)}

        /* POLL CREATOR */
        .poll-creator{padding:16px;flex:1;overflow-y:auto}
        .poll-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:0.82rem;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;margin-bottom:8px}
        .poll-input:focus{border-color:var(--blue)}
        .poll-opt-input{display:flex;gap:8px;margin-bottom:8px;align-items:center}
        .opt-label{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;color:var(--muted);min-width:20px}
        .add-opt-btn{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--blue);background:transparent;border:none;cursor:pointer;padding:6px 0;font-weight:600}
        .launch-poll-btn{width:100%;padding:12px;border-radius:10px;background:var(--blue);border:none;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;margin-top:12px;transition:background 0.2s}
        .launch-poll-btn:hover{background:var(--blue2)}
        .end-poll-btn{width:100%;padding:10px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;margin-top:8px;transition:all 0.2s}
        .end-poll-btn:hover{background:rgba(239,68,68,0.2)}

        /* DPP UPLOADER */
        .dpp-creator{padding:16px;flex:1;overflow-y:auto}
        .upload-zone{border:2px dashed var(--border);border-radius:14px;padding:28px;text-align:center;color:var(--muted);cursor:pointer;transition:all 0.2s;margin-bottom:12px}
        .upload-zone:hover{border-color:var(--blue);color:var(--blue)}
        .upload-zone i{font-size:2rem;margin-bottom:8px;display:block}
        .upload-zone p{font-size:0.82rem}

        /* TOAST */
        .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
        .toast{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:0.82rem;font-weight:600;color:var(--text);animation:toastIn 0.3s ease;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
        @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .toast.green{border-color:rgba(34,197,94,0.4);color:var(--green)}
        .toast.red{border-color:rgba(239,68,68,0.4);color:var(--red)}
    </style>
</head>
<body>

<!-- BATCH OVERLAY -->
<div class="overlay" id="batch-overlay">
    <div class="overlay-box">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
            <div style="width:44px;height:44px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.2rem">🎙️</div>
            <div>
                <h2>Launch Teaching Studio</h2>
                <p style="margin-bottom:0">Select a batch to begin live session</p>
            </div>
        </div>
        <div id="batch-list"><div style="color:var(--muted);font-size:0.82rem">Loading batches…</div></div>
        <button class="launch-btn" id="launch-btn" disabled onclick="startSession()">
            <i class="fas fa-video"></i> Go Live
        </button>
    </div>
</div>

<!-- HEADER -->
<header class="header">
    <div class="header-left">
        <a href="staff.html" style="color:var(--muted);font-size:0.82rem;text-decoration:none;display:flex;align-items:center;gap:6px">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem" id="batch-header-name">Teaching Studio</div>
            <div class="viewer-pill"><i class="fas fa-circle" style="color:var(--green);font-size:0.5rem"></i> <span id="viewer-count">0</span> students watching</div>
        </div>
        <div class="live-badge">LIVE</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
        <div class="timer" id="class-timer">00:00</div>
        <button class="tool-btn danger" onclick="confirmEndSession()">
            <i class="fas fa-stop-circle"></i> End Session
        </button>
    </div>
</header>

<!-- MAIN -->
<div class="main">
    <!-- VIDEO COL -->
    <div class="video-col">
        <div id="jitsi-container" style="flex:1;width:100%"></div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn" onclick="document.getElementById('dpp-file-input').click()">
                    <i class="fas fa-file-upload"></i> Share DPP
                </button>
                <input type="file" id="dpp-file-input" style="display:none" accept=".pdf,.doc,.docx" onchange="uploadDPP(this)">
                <button class="tool-btn" onclick="switchTab('poll',document.querySelectorAll('.stab')[2])">
                    <i class="fas fa-poll-h"></i> Create Poll
                </button>
                <button class="tool-btn" onclick="shareYouTubeLink()">
                    <i class="fab fa-youtube"></i> Share Video
                </button>
            </div>
            <div class="tool-group">
                <button class="tool-btn primary" onclick="pinAnnouncement()">
                    <i class="fas fa-thumbtack"></i> Pin Message
                </button>
                <button class="tool-btn danger" onclick="confirmEndSession()">
                    <i class="fas fa-stop-circle"></i> End Session
                </button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-tabs">
            <button class="stab active" onclick="switchTab('chat',this)"><i class="fas fa-comments"></i> Chat</button>
            <button class="stab" onclick="switchTab('students',this)"><i class="fas fa-users"></i> Students</button>
            <button class="stab" onclick="switchTab('poll',this)"><i class="fas fa-poll"></i> Poll</button>
            <button class="stab" onclick="switchTab('dpp',this)"><i class="fas fa-tasks"></i> DPP</button>
        </div>

        <!-- HAND RAISE ALERTS -->
        <div id="hand-alerts" style="padding:8px 12px;display:flex;flex-direction:column;gap:6px"></div>

        <!-- CHAT -->
        <div class="tab-content active" id="tab-chat">
            <div class="chat-area" id="chat-messages"></div>
        </div>

        <!-- STUDENTS -->
        <div class="tab-content" id="tab-students">
            <div style="padding:12px 14px 6px;font-family:'Syne',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">
                Online Now — <span id="online-count">0</span>
            </div>
            <div class="student-panel" id="student-list">
                <div style="color:var(--muted);font-size:0.82rem;text-align:center;padding:20px">Loading students…</div>
            </div>
        </div>

        <!-- POLL CREATOR -->
        <div class="tab-content" id="tab-poll">
            <div class="poll-creator" id="poll-creator-area">
                <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:14px;font-size:0.9rem">Create Live Poll</div>
                <textarea class="poll-input" id="poll-question" rows="2" placeholder="Type your question…"></textarea>
                <div id="poll-options-list">
                    <div class="poll-opt-input"><span class="opt-label">A</span><input class="poll-input" style="margin:0" placeholder="Option A…"></div>
                    <div class="poll-opt-input"><span class="opt-label">B</span><input class="poll-input" style="margin:0" placeholder="Option B…"></div>
                    <div class="poll-opt-input"><span class="opt-label">C</span><input class="poll-input" style="margin:0" placeholder="Option C…"></div>
                    <div class="poll-opt-input"><span class="opt-label">D</span><input class="poll-input" style="margin:0" placeholder="Option D…"></div>
                </div>
                <button class="launch-poll-btn" onclick="launchPoll()"><i class="fas fa-broadcast-tower"></i> Launch Poll</button>
                <button class="end-poll-btn" id="end-poll-btn" style="display:none" onclick="endPoll()"><i class="fas fa-stop"></i> End Poll</button>
            </div>
        </div>

        <!-- DPP MANAGER -->
        <div class="tab-content" id="tab-dpp">
            <div class="dpp-creator">
                <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:14px;font-size:0.9rem">Share DPP / Notes</div>
                <div class="upload-zone" onclick="document.getElementById('dpp-file-input2').click()">
                    <input type="file" id="dpp-file-input2" style="display:none" accept=".pdf,.doc,.docx" onchange="uploadDPP(this)">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Tap to upload PDF / Word</p>
                    <p style="font-size:0.7rem;margin-top:4px">or drag and drop</p>
                </div>
                <input class="poll-input" id="dpp-title" placeholder="DPP Title (e.g. Trigonometry DPP #3)">
                <input class="poll-input" id="dpp-topic" placeholder="Topic (e.g. Sin/Cos identities)">
                <input class="poll-input" id="dpp-url" placeholder="Or paste a Google Drive / URL link">
                <button class="launch-poll-btn" onclick="shareDPPManual()"><i class="fas fa-share"></i> Share with Students</button>
                <div id="dpp-shared-list" style="margin-top:16px;display:flex;flex-direction:column;gap:8px"></div>
            </div>
        </div>

        <!-- CHAT FOOTER -->
        <div class="chat-footer" id="chat-footer-area">
            <textarea class="announce-input" id="announce-input" rows="2" placeholder="Announce to class… (Shift+Enter for new line)"></textarea>
            <div class="announce-row">
                <button class="send-btn" onclick="sendAnnouncement()"><i class="fas fa-bullhorn"></i> Announce</button>
                <button class="pin-btn" onclick="sendPinned()"><i class="fas fa-thumbtack"></i></button>
            </div>
        </div>
    </aside>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const firebaseConfig={apiKey:"AIzaSyDkrbfNKopAWj7ZA5fCrkjsOz_dsdMCmCs",authDomain:"era-of-mathantics-8b6d1.firebaseapp.com",projectId:"era-of-mathantics-8b6d1",storageBucket:"era-of-mathantics-8b6d1.firebasestorage.app",messagingSenderId:"521238168559",appId:"1:521238168559:web:83b3c06de5b28b1eac6c1a"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();
let storage;
try{storage=firebase.storage();}catch(e){}

let currentUser=null,selectedBatch=null,sessionDocId=null,classStartTime=null,activePollId=null;
const COLORS=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#22c55e','#06b6d4','#f97316'];
function userColor(n){let h=0;for(let c of(n||'U'))h=c.charCodeAt(0)+h*31;return COLORS[Math.abs(h)%COLORS.length];}
function userInitial(n){return(n||'?').charAt(0).toUpperCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function init(){
    try{
        const res=await fetch('/api/check-auth');const data=await res.json();
        if(!data.authenticated||data.role!=='staff'){window.location.href='index.html';return;}
        currentUser=data;
    }catch(e){window.location.href='index.html';return;}
    try{await auth.signInAnonymously();}catch(e){}
    loadBatches();
}

async function loadBatches(){
    const list=document.getElementById('batch-list');
    try{
        const snap=await db.collection('batches').get();
        if(snap.empty){list.innerHTML='<div style="color:var(--muted);font-size:0.82rem">No batches found. Create one in Staff Portal.</div>';return;}
        list.innerHTML='';
        snap.forEach(doc=>{
            const d=doc.data();
            const item=document.createElement('div');
            item.className='batch-item';
            item.dataset.id=doc.id;
            item.innerHTML=`<div class="batch-icon">${(d.name||'B').charAt(0)}</div><div><div style="font-weight:600;font-size:0.88rem">${esc(d.name||'Batch')}</div><div style="font-size:0.72rem;color:var(--muted)">${esc(d.grade||'')} · ${esc(d.subject||'Mathematics')}</div></div>`;
            item.onclick=()=>{
                document.querySelectorAll('.batch-item').forEach(i=>i.classList.remove('selected'));
                item.classList.add('selected');
                selectedBatch={id:doc.id,...d};
                document.getElementById('launch-btn').disabled=false;
            };
            list.appendChild(item);
        });
    }catch(e){list.innerHTML='<div style="color:var(--muted);font-size:0.82rem">Error loading batches.</div>';}
}

async function startSession(){
    if(!selectedBatch)return;
    document.getElementById('batch-overlay').style.display='none';
    document.getElementById('batch-header-name').textContent=selectedBatch.name||'Live Session';
    // Mark class live in Firestore
    const ref=await db.collection('live_sessions').add({
        batchId:selectedBatch.id,batchName:selectedBatch.name,
        startedAt:firebase.firestore.FieldValue.serverTimestamp(),
        active:true,teacher:currentUser.name||currentUser.email,classTitle:selectedBatch.name
    });
    sessionDocId=ref.id;
    classStartTime=Date.now();
    startTimer();
    startJitsi();
    listenChat();
    listenViewers();
    loadSharedDPP();
}

function startJitsi(){
    const name=currentUser.name||currentUser.email.split('@')[0]+' (Teacher)';
    try{
        new JitsiMeetExternalAPI('meet.jit.si',{
            roomName:`EraOfMathAntics_Live_${selectedBatch.id}`,
            width:'100%',height:'100%',
            parentNode:document.getElementById('jitsi-container'),
            configOverwrite:{startWithAudioMuted:false,startWithVideoMuted:false,enableWelcomePage:false,prejoinPageEnabled:false},
            interfaceConfigOverwrite:{TOOLBAR_BUTTONS:['microphone','camera','desktop','fullscreen','hangup','chat','raisehand','tileview','videoquality','filmstrip'],MOBILE_APP_PROMO:false,SHOW_JITSI_WATERMARK:false},
            userInfo:{email:currentUser.email,displayName:name}
        });
    }catch(e){showToast('Jitsi failed to load','red');}
}

function startTimer(){
    setInterval(()=>{
        const el=Math.floor((Date.now()-classStartTime)/1000);
        const h=Math.floor(el/3600),m=Math.floor((el%3600)/60),s=el%60;
        document.getElementById('class-timer').textContent=(h>0?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    },1000);
}

function listenViewers(){
    db.collection('live_viewers').doc(selectedBatch.id).collection('active')
        .onSnapshot(snap=>{
            document.getElementById('viewer-count').textContent=snap.size;
            document.getElementById('online-count').textContent=snap.size;
            const list=document.getElementById('student-list');
            list.innerHTML='';
            snap.forEach(doc=>{
                const d=doc.data();
                const color=userColor(d.name);
                const row=document.createElement('div');
                row.className='student-row';
                row.innerHTML=`<div class="s-avatar" style="background:${color}20;color:${color}">${userInitial(d.name)}</div><div class="s-info"><div class="s-name">${esc(d.name||'Student')}</div></div><div class="online-badge"></div>`;
                list.appendChild(row);
            });
        });
}

function listenChat(){
    db.collection('live_chats').doc(selectedBatch.id).collection('messages')
        .orderBy('timestamp','asc').limitToLast(100)
        .onSnapshot(snap=>{
            snap.docChanges().forEach(ch=>{
                if(ch.type==='added') renderMessage(ch.doc.data());
            });
        });
}

function renderMessage(msg){
    const box=document.getElementById('chat-messages');
    const isTeacher=msg.role==='staff';
    const isHand=msg.handRaise;
    const name=msg.name||msg.email?.split('@')[0]||'Student';
    const color=userColor(name);
    if(isHand){
        // Also show alert
        const alerts=document.getElementById('hand-alerts');
        const al=document.createElement('div');al.className='hand-alert';
        al.innerHTML=`<span>✋ <strong>${esc(name)}</strong> raised their hand</span><button class="hand-dismiss" onclick="this.parentElement.remove()">Dismiss</button>`;
        alerts.appendChild(al);
        setTimeout(()=>{al.remove();},15000);
    }
    const div=document.createElement('div');
    div.className=`msg${isHand?' hand':''}`;
    div.innerHTML=`
        <div class="msg-avatar" style="background:${color}20;color:${color}">${userInitial(name)}</div>
        <div class="msg-body">
            <div class="msg-name">
                <span style="color:${color};font-size:0.72rem">${esc(name)}</span>
                ${isTeacher?'<span style="background:rgba(59,130,246,0.2);color:var(--blue);font-size:0.58rem;padding:1px 6px;border-radius:4px;font-family:Syne,sans-serif;letter-spacing:0.06em;text-transform:uppercase">Teacher</span>':''}
            </div>
            <div class="msg-text">${esc(msg.text)}</div>
        </div>`;
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
}

async function sendAnnouncement(){
    const input=document.getElementById('announce-input');
    const text=input.value.trim();
    if(!text||!selectedBatch)return;
    input.value='';
    const name=currentUser.name||currentUser.email.split('@')[0];
    await db.collection('live_chats').doc(selectedBatch.id).collection('messages').add({
        text,email:currentUser.email,name:'📢 '+name,role:'staff',
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
}

async function sendPinned(){
    const input=document.getElementById('announce-input');
    const text=input.value.trim();
    if(!text||!selectedBatch)return;
    input.value='';
    const name=currentUser.name||currentUser.email.split('@')[0];
    await db.collection('live_chats').doc(selectedBatch.id).collection('messages').add({
        text:'📌 PINNED: '+text,email:currentUser.email,name,role:'staff',pinned:true,
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Message pinned!','green');
}

async function pinAnnouncement(){
    const input=document.getElementById('announce-input');
    const text=input.value.trim();
    if(!text){showToast('Type a message first','');return;}
    await sendPinned();
}

// POLL
async function launchPoll(){
    if(!selectedBatch)return;
    const q=document.getElementById('poll-question').value.trim();
    if(!q){showToast('Enter a question','');return;}
    const opts=[...document.querySelectorAll('#poll-options-list input')].map(i=>i.value.trim()).filter(Boolean);
    if(opts.length<2){showToast('Add at least 2 options','');return;}
    const ref=await db.collection('live_polls').add({
        batchId:selectedBatch.id,question:q,options:opts,
        votes:Object.fromEntries(opts.map((_,i)=>[i,0])),
        userVotes:{},active:true,
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
    activePollId=ref.id;
    document.getElementById('end-poll-btn').style.display='block';
    showToast('Poll launched! Students can vote now','green');
    // Announce in chat
    await db.collection('live_chats').doc(selectedBatch.id).collection('messages').add({
        text:`📊 Poll launched: "${q}" — Check the Poll tab to vote!`,
        email:currentUser.email,name:currentUser.name||'Teacher',role:'staff',
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
}

async function endPoll(){
    if(!activePollId)return;
    await db.collection('live_polls').doc(activePollId).update({active:false});
    activePollId=null;
    document.getElementById('end-poll-btn').style.display='none';
    showToast('Poll ended','');
}

// DPP UPLOAD
async function uploadDPP(input){
    const file=input.files[0];
    if(!file||!selectedBatch)return;
    const title=document.getElementById('dpp-title').value||file.name;
    const topic=document.getElementById('dpp-topic').value||'';
    showToast('Uploading…','');
    try{
        if(storage){
            const ref2=storage.ref(`dpp/${selectedBatch.id}/${Date.now()}_${file.name}`);
            await ref2.put(file);
            const url=await ref2.getDownloadURL();
            await db.collection('dpp').add({batchId:selectedBatch.id,title,topic,url,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
            await db.collection('live_resources').add({batchId:selectedBatch.id,title,url,type:'pdf',timestamp:firebase.firestore.FieldValue.serverTimestamp()});
            showToast('DPP shared with students!','green');
            loadSharedDPP();
        }else{
            showToast('Storage not configured. Use URL method.','red');
        }
    }catch(e){showToast('Upload failed: '+e.message,'red');}
}

async function shareDPPManual(){
    const url=document.getElementById('dpp-url').value.trim();
    const title=document.getElementById('dpp-title').value.trim();
    const topic=document.getElementById('dpp-topic').value.trim();
    if(!url||!title){showToast('Enter title and URL','');return;}
    if(!selectedBatch){showToast('Start session first','');return;}
    await db.collection('dpp').add({batchId:selectedBatch.id,title,topic,url,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection('live_resources').add({batchId:selectedBatch.id,title,url,type:'pdf',timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    document.getElementById('dpp-url').value='';document.getElementById('dpp-title').value='';document.getElementById('dpp-topic').value='';
    showToast('DPP shared!','green');
    loadSharedDPP();
}

function loadSharedDPP(){
    if(!selectedBatch)return;
    db.collection('dpp').where('batchId','==',selectedBatch.id).orderBy('timestamp','desc').limit(10)
        .onSnapshot(snap=>{
            const list=document.getElementById('dpp-shared-list');list.innerHTML='';
            snap.forEach(doc=>{
                const d=doc.data();
                const card=document.createElement('div');
                card.style.cssText='background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px';
                card.innerHTML=`<i class="fas fa-file-pdf" style="color:var(--red)"></i><div style="flex:1"><div style="font-size:0.8rem;font-weight:600">${esc(d.title)}</div><div style="font-size:0.68rem;color:var(--muted)">${esc(d.topic||'')}</div></div><a href="${d.url}" target="_blank" style="color:var(--blue);font-size:0.75rem"><i class="fas fa-external-link-alt"></i></a>`;
                list.appendChild(card);
            });
        });
}

async function shareYouTubeLink(){
    const url=prompt('Paste YouTube video URL:');
    if(!url||!selectedBatch)return;
    const title=prompt('Video title:')||'Video';
    await db.collection('live_resources').add({batchId:selectedBatch.id,title,url,type:'youtube',timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    showToast('Video link shared!','green');
}

async function confirmEndSession(){
    if(!confirm('End this live session for all students?'))return;
    if(sessionDocId) await db.collection('live_sessions').doc(sessionDocId).update({active:false,endedAt:firebase.firestore.FieldValue.serverTimestamp()});
    if(activePollId) await db.collection('live_polls').doc(activePollId).update({active:false});
    showToast('Session ended','');
    setTimeout(()=>{window.location.href='staff.html';},1500);
}

function switchTab(name,btn){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    btn.classList.add('active');
    document.getElementById('chat-footer-area').style.display=name==='chat'?'block':'none';
}

function showToast(msg,type){
    const wrap=document.getElementById('toast-wrap');
    const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;
    wrap.appendChild(t);setTimeout(()=>t.remove(),3000);
}

document.getElementById('announce-input').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAnnouncement();}
});

init();
</script>
</body>
</html>
